<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shift Planner — LRP Support Portal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#eef5fc;display:flex;flex-direction:column;overflow:hidden;}
.topbar{display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:10px 24px;background:#fff;border-bottom:1.5px solid #c8dff0;box-shadow:0 2px 8px rgba(26,90,160,.07);flex-shrink:0;gap:16px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:34px;height:34px;background:linear-gradient(135deg,#1a7db5,#0a3d78);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.brand-title{font-size:13px;font-weight:800;color:#0a3d78;letter-spacing:2px;}
.brand-sub{font-size:10px;color:#2a6090;letter-spacing:1px;font-weight:600;}
.btn-back{font-size:12px;font-weight:700;letter-spacing:1.5px;padding:7px 16px;background:#eef5fc;border:1.5px solid #b8d4ee;border-radius:6px;color:#1a5a90;cursor:pointer;text-transform:uppercase;text-decoration:none;display:inline-block;}
.btn-back:hover{background:#d0e8f8;}
.body{flex:1;overflow:auto;padding:14px 22px;}

/* Month nav */
.month-nav{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid #c8dff0;border-radius:8px;padding:6px 12px;margin-right:4px;}
.month-nav button{background:none;border:none;color:#1a7db5;cursor:pointer;font-size:18px;font-weight:700;line-height:1;padding:0 2px;transition:color .15s;}
.month-nav button:hover{color:#0a3d78;}
.month-label{font-size:14px;font-weight:800;color:#0a3d78;min-width:130px;text-align:center;}

.sp-pill{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px;min-width:44px;text-align:center;}
.sp-D1{background:#ddeeff;border:1px solid #7ab8e8;color:#0a4070;}
.sp-D2{background:#d8eeff;border:1px solid #60a0d8;color:#083860;}
.sp-D3{background:#e8deff;border:1px solid #a878d8;color:#400880;}
.sp-D4{background:#d4f0e8;border:1px solid #50c0a0;color:#0a5040;}
.sp-D5{background:#d8f5e0;border:1px solid #60d088;color:#0a5020;}
.sp-N{background:#dde0f8;border:1px solid #8090d8;color:#202870;}
.sp-WOFF{background:#f0f0f0;border:1px solid #c0c0c0;color:#606060;}
.sp-HOL{background:#fff8d8;border:1px solid #e8d040;color:#705010;}
.sp-COMP{background:#ffe8d8;border:1px solid #e09050;color:#703010;}
.sp-empty{background:#f4f4f4;border:1px dashed #d0d0d0;color:#c0c0c0;font-style:italic;}
.sp-today-col{background:#eef8ff!important;}
.sp-today-pill{outline:2.5px solid #1a7db5!important;outline-offset:-2px;}
.ap-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.ap-tbl th{padding:7px 9px;text-align:center;font-size:10px;font-weight:700;color:#1a7db5;text-transform:uppercase;letter-spacing:1px;background:#eef5fc;border:1px solid #c8dff0;white-space:nowrap;position:sticky;top:0;z-index:2;}
.ap-tbl th.ap-col-name{text-align:left;min-width:160px;position:sticky;left:0;z-index:3;background:#ddeeff;}
.ap-tbl td{padding:6px 8px;text-align:center;border:1px solid #ddeeff;color:#2a4a6a;vertical-align:middle;}
.ap-tbl td.ap-col-name{text-align:left;font-size:13px;font-weight:700;color:#0a3d78;position:sticky;left:0;background:#f4f9ff;border-right:1.5px solid #b8d4ee;white-space:nowrap;}
.ap-tbl tr:hover td{background:#eef5fc;}
.ap-tbl tr:hover td.ap-col-name{background:#d0e8f8;}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <div class="brand-icon">🚢</div>
    <div>
      <div class="brand-title">LRP SUPPORT PORTAL</div>
      <div class="brand-sub">📅 Shift Planner</div>
    </div>
  </div>
  <div></div>
  <a class="btn-back" href="lrp_portal.html">← Back to Dashboard</a>
</div>

<div class="body">
  <!-- Toolbar -->
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;">
    <!-- Month nav -->
    <div class="month-nav">
      <button onclick="prevMonth()" title="Previous month">‹</button>
      <span class="month-label" id="ap-month-label">April 2026</span>
      <button onclick="nextMonth()" title="Next month">›</button>
    </div>

    <!-- Search -->
    <div style="position:relative;">
      <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;">🔍</span>
      <input id="ap-search" type="text" placeholder="Search name or ID..."
        style="background:#fff;border:1.5px solid #b8d4ee;border-radius:6px;padding:8px 12px 8px 34px;font-size:13px;color:#1a3a5c;outline:none;width:200px;"
        oninput="buildTable()"/>
    </div>

    <span id="ap-today-lbl" style="font-size:12px;color:#1a7db5;font-weight:700;white-space:nowrap;"></span>
    <span id="ap-updated-lbl" style="font-size:11px;color:#1a8c5c;font-weight:600;white-space:nowrap;"></span>
  </div>

  <!-- Legend -->
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;" id="ap-legend"></div>

  <div style="overflow-x:auto;border:1.5px solid #c8dff0;border-radius:10px;background:#fff;box-shadow:0 2px 8px rgba(26,90,160,.05);">
    <div id="ap-table" style="min-width:900px;">
      <div style="padding:40px;text-align:center;color:#3a7aaa;font-size:14px;font-weight:600;">⏳ Loading shift planner...</div>
    </div>
  </div>
</div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbxHeMgaV389GYgDf8CeFMUVRnC5uuBe9x60e4_wBLuoCjE83158t6AIuapJoTy6TyfzcA/exec';

const LGND=[
  {key:'D1',label:'Morning',cls:'sp-D1'},
  {key:'D2',label:'Afternoon',cls:'sp-D2'},
  {key:'D4',label:'Day',cls:'sp-D4'},
  {key:'D5',label:'Evening',cls:'sp-D5'},
  {key:'N',label:'Night',cls:'sp-N'},
  {key:'W/OFF',label:'Week Off',cls:'sp-WOFF'},
  {key:'Holiday',label:'Holiday',cls:'sp-HOL'},
  {key:'Compff',label:'Comp Off',cls:'sp-COMP'}
];
document.getElementById('ap-legend').innerHTML=LGND.map(l=>
  `<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#2a6090;font-weight:600;">
    <span class="sp-pill ${l.cls}">${l.key}</span>${l.label}
  </span>`).join('');

const SHIFT_CLS={
  D1:'sp-D1',D2:'sp-D2',D3:'sp-D3',D4:'sp-D4',D5:'sp-D5',
  N:'sp-N','W/OFF':'sp-WOFF',HOLIDAY:'sp-HOL',COMPFF:'sp-COMP'
};

// State
let plannerTeam  = [];          // [{id,name,primary,shifts:{dateKey:val}}]
let viewYear     = new Date().getFullYear();
let viewMonth    = new Date().getMonth(); // 0-based

const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAY_NAMES  =['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function getTodayISO(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function getDaysInMonth(y,m){
  const count=new Date(y,m+1,0).getDate();
  const days=[];
  for(let d=1;d<=count;d++){
    const dt=new Date(y,m,d);
    const iso=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    days.push({iso, day:String(d).padStart(2,'0'), dayName:DAY_NAMES[dt.getDay()]});
  }
  return days;
}
function spCls(s){
  if(!s||!s.trim())return'sp-empty';
  return SHIFT_CLS[s.trim().toUpperCase()]||'sp-D1';
}

function updateMonthLabel(){
  document.getElementById('ap-month-label').textContent=MONTH_NAMES[viewMonth]+' '+viewYear;
}
function prevMonth(){
  viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--;}
  updateMonthLabel();buildTable();
}
function nextMonth(){
  viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++;}
  updateMonthLabel();buildTable();
}

function buildTable(){
  if(!plannerTeam.length){
    document.getElementById('ap-table').innerHTML='<div style="padding:40px;text-align:center;color:#3a7aaa;">No data available.</div>';
    return;
  }

  const days    = getDaysInMonth(viewYear,viewMonth);
  const todayISO= getTodayISO();
  const todayMo = todayISO.slice(0,7);
  const viewMo  = viewYear+'-'+String(viewMonth+1).padStart(2,'0');

  // Today label
  document.getElementById('ap-today-lbl').textContent=
    todayMo===viewMo?'Today: '+todayISO.slice(8)+' ('+DAY_NAMES[new Date().getDay()]+')':'';

  const sq=(document.getElementById('ap-search').value||'').toLowerCase();
  const filtered=sq?plannerTeam.filter(m=>(m.name||'').toLowerCase().includes(sq)||(m.id||'').toLowerCase().includes(sq)):plannerTeam;

  // Header
  let hdr='<tr><th class="ap-col-name" rowspan="2">Name</th>';
  days.forEach(d=>{
    const isT=d.iso===todayISO, isW=d.dayName==='Sat'||d.dayName==='Sun';
    hdr+=`<th style="padding:7px 6px;text-align:center;font-size:10px;font-weight:700;white-space:nowrap;border:1px solid #c8dff0;background:${isT?'#d8eeff':'#eef5fc'};color:${isT?'#1a7db5':isW?'#888':'#1a7db5'};">${d.day}</th>`;
  });
  hdr+='</tr><tr>';
  days.forEach(d=>{
    const isT=d.iso===todayISO, isW=d.dayName==='Sat'||d.dayName==='Sun';
    hdr+=`<th style="font-size:9px;padding:6px;text-align:center;font-weight:700;border:1px solid #c8dff0;background:${isT?'#d8eeff':'#eef5fc'};color:${isT?'#1a7db5':isW?'#888':'#1a7db5'};">${d.dayName}</th>`;
  });
  hdr+='</tr>';

  const rows=filtered.map(m=>{
    const shifts=m.shifts||{};
    let cells='';
    days.forEach(d=>{
      const s=shifts[d.iso]||'';
      const isT=d.iso===todayISO;
      const cls=spCls(s);
      cells+=`<td class="${isT?'ap-today-col':''}">
        <span class="sp-pill ${cls}${isT?' sp-today-pill':''}">${s||'—'}</span>
      </td>`;
    });
    return`<tr>
      <td class="ap-col-name">
        <div>${m.name}</div>
        <div style="font-size:10px;color:#3a7aaa;margin-top:1px;font-weight:600;">${m.id}</div>
      </td>${cells}
    </tr>`;
  }).join('');

  document.getElementById('ap-table').innerHTML=`<table class="ap-tbl"><thead>${hdr}</thead><tbody>${rows}</tbody></table>`;
}

// Load from server
(async function(){
  try{
    const res  = await fetch(API_URL+'?action=getPlanner&t='+Date.now());
    const data = await res.json();
    if(data.success&&data.planner&&data.planner.length){
      const raw=data.planner;
      // Detect format
      if(raw[0]&&raw[0].shifts&&typeof raw[0].shifts==='object'&&!Array.isArray(raw[0].shifts)){
        // New date-keyed format
        plannerTeam=raw.map(m=>({id:m.id,name:m.name,primary:m.primary||'',shifts:m.shifts||{}}));
      } else {
        // Legacy array-indexed format — show empty (admin needs to re-publish)
        plannerTeam=raw.map(m=>({id:m.id||String(m.sl),name:m.name,primary:m.primary||'',shifts:{}}));
      }
      if(data.updatedAt){
        const d=new Date(data.updatedAt);
        document.getElementById('ap-updated-lbl').textContent=
          '✅ Updated: '+d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+
          ' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      }
    } else {
      document.getElementById('ap-updated-lbl').textContent='ℹ No planner data published yet.';
    }
  } catch{
    document.getElementById('ap-updated-lbl').textContent='⚠ Could not load — check connection.';
  }
  updateMonthLabel();
  buildTable();
})();
</script>
</body>
</html>
