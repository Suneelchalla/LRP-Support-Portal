<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shift Planner — LRP Support Portal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#eef5fc;display:flex;flex-direction:column;overflow:hidden;}
.topbar{display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:10px 24px;background:#fff;border-bottom:1.5px solid #c8dff0;box-shadow:0 2px 8px rgba(26,90,160,.07);flex-shrink:0;gap:16px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:34px;height:34px;background:linear-gradient(135deg,#1a7db5,#0a3d78);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.brand-title{font-size:13px;font-weight:800;color:#0a3d78;letter-spacing:2px;}
.brand-sub{font-size:10px;color:#2a6090;letter-spacing:1px;font-weight:600;}
.btn-back{font-size:12px;font-weight:700;letter-spacing:1.5px;padding:7px 16px;background:#eef5fc;border:1.5px solid #b8d4ee;border-radius:6px;color:#1a5a90;cursor:pointer;text-transform:uppercase;text-decoration:none;display:inline-block;}
.btn-back:hover{background:#d0e8f8;}
.body{flex:1;overflow:auto;padding:16px 22px;}
.sp-pill{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px;min-width:44px;text-align:center;}
.sp-D1{background:#ddeeff;border:1px solid #7ab8e8;color:#0a4070;}
.sp-D2{background:#d8eeff;border:1px solid #60a0d8;color:#083860;}
.sp-D3{background:#e8deff;border:1px solid #a878d8;color:#400880;}
.sp-D4{background:#d4f0e8;border:1px solid #50c0a0;color:#0a5040;}
.sp-D5{background:#d8f5e0;border:1px solid #60d088;color:#0a5020;}
.sp-N{background:#dde0f8;border:1px solid #8090d8;color:#202870;}
.sp-WOFF{background:#f0f0f0;border:1px solid #c0c0c0;color:#606060;}
.sp-HOL{background:#fff8d8;border:1px solid #e8d040;color:#705010;}
.sp-COMP{background:#ffe8d8;border:1px solid #e09050;color:#703010;}
.sp-today-col{background:#eef8ff!important;}
.sp-today-pill{outline:2.5px solid #1a7db5!important;outline-offset:-2px;}
.ap-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.ap-tbl th{padding:7px 9px;text-align:center;font-size:10px;font-weight:700;color:#1a7db5;text-transform:uppercase;letter-spacing:1px;background:#eef5fc;border:1px solid #c8dff0;white-space:nowrap;position:sticky;top:0;z-index:2;}
.ap-tbl th.ap-col-name{text-align:left;min-width:160px;position:sticky;left:0;z-index:3;background:#ddeeff;}
.ap-tbl td{padding:6px 8px;text-align:center;border:1px solid #ddeeff;color:#2a4a6a;vertical-align:middle;}
.ap-tbl td.ap-col-name{text-align:left;font-size:13px;font-weight:700;color:#0a3d78;position:sticky;left:0;background:#f4f9ff;border-right:1.5px solid #b8d4ee;white-space:nowrap;}
.ap-tbl tr:hover td{background:#eef5fc;}
.ap-tbl tr:hover td.ap-col-name{background:#d0e8f8;}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <div class="brand-icon">🚢</div>
    <div>
      <div class="brand-title">LRP SUPPORT PORTAL</div>
      <div class="brand-sub">📅 Shift Planner</div>
    </div>
  </div>
  <div></div>
  <a class="btn-back" href="lrp_portal.html">← Back to Dashboard</a>
</div>
<div class="body">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;">
    <div style="position:relative;">
      <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;">🔍</span>
      <input id="ap-search" type="text" placeholder="Search name or ID..."
        style="background:#fff;border:1.5px solid #b8d4ee;border-radius:6px;padding:8px 12px 8px 34px;font-size:13px;color:#1a3a5c;outline:none;width:220px;"
        oninput="buildTable(window._apLastTeam)"/>
    </div>
    <span id="ap-today-lbl" style="font-size:12px;color:#1a7db5;font-weight:700;white-space:nowrap;"></span>
    <span id="ap-updated-lbl" style="font-size:11px;color:#1a8c5c;font-weight:600;white-space:nowrap;"></span>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;" id="ap-legend"></div>
  <div style="overflow-x:auto;border:1.5px solid #c8dff0;border-radius:10px;background:#fff;box-shadow:0 2px 8px rgba(26,90,160,.05);">
    <div id="ap-table" style="min-width:1100px;">
      <div style="padding:40px;text-align:center;color:#3a7aaa;font-size:14px;font-weight:600;">⏳ Loading shift planner...</div>
    </div>
  </div>
</div>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbxHeMgaV389GYgDf8CeFMUVRnC5uuBe9x60e4_wBLuoCjE83158t6AIuapJoTy6TyfzcA/exec';

const PDATES=['30-03-2026','31-03-2026','01-04-2026','02-04-2026','03-04-2026','04-04-2026','05-04-2026','06-04-2026','07-04-2026','08-04-2026','09-04-2026','10-04-2026','11-04-2026','12-04-2026','13-04-2026','14-04-2026','15-04-2026','16-04-2026','17-04-2026','18-04-2026','19-04-2026','20-04-2026','21-04-2026','22-04-2026','23-04-2026','24-04-2026','25-04-2026','26-04-2026','27-04-2026','28-04-2026','29-04-2026','30-04-2026','01-05-2026','02-05-2026','03-05-2026'];
const PDAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun','Mon','Tue','Wed','Thu','Fri','Sat','Sun','Mon','Tue','Wed','Thu','Fri','Sat','Sun','Mon','Tue','Wed','Thu','Fri','Sat','Sun','Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

const PDEF=[
  {id:'SM1658',name:'Vignesh Maharajan',primary:'Customer Service',shifts:['D5','D5','D5','D5','Holiday','W/OFF','W/OFF','D5','D5','D5','D5','D5','W/OFF','W/OFF','D5','Holiday','D5','D5','D5','W/OFF','W/OFF','D5','D5','D5','D5','D5','W/OFF','W/OFF','D5','D5','D5','D5','D5','W/OFF','W/OFF']},
  {id:'SM2045',name:'Akash Nagarathinam',primary:'EMS/EDI',shifts:['D2','D2','D2','D2','D2','W/OFF','W/OFF','Compff','D1','D1','D1','D1','W/OFF','W/OFF','D1','Holiday','D1','D1','D1','W/OFF','W/OFF','D2','D2','D2','D2','D2','W/OFF','W/OFF','D2','D2','D2','D2','D2','W/OFF','W/OFF']},
  {id:'SM1638',name:'Challa Venkat Suneel',primary:'Operations',shifts:['D4','D4','D4','D4','Holiday','W/OFF','W/OFF','D4','D4','D4','D4','D4','W/OFF','W/OFF','D4','Holiday','D4','D4','D4','W/OFF','W/OFF','D4','D4','D4','D4','D4','W/OFF','W/OFF','D4','D4','D4','D4','D4','W/OFF','W/OFF']},
  {id:'SM2197',name:'Vinoth Bhoopathy',primary:'Operations',shifts:['D1','D1','D1','D1','Holiday','W/OFF','W/OFF','D2','D2','D2','D2','D2','W/OFF','W/OFF','D2','Holiday','D2','D2','D2','W/OFF','W/OFF','D1','D1','D1','W/OFF','D1','D1','D1','W/OFF','D1','D1','D1','D1','W/OFF','W/OFF']},
  {id:'SM2335',name:'Vignesh Rajapandi',primary:'Operations',shifts:['D4','D4','D4','D4','Holiday','W/OFF','W/OFF','D4','D4','D4','D4','D4','W/OFF','W/OFF','D4','Holiday','D4','D4','D4','W/OFF','W/OFF','D4','D4','D4','D4','D4','W/OFF','W/OFF','D4','D4','D4','D4','D4','W/OFF','W/OFF']},
  {id:'SM2145',name:'Rene Claret A',primary:'Customer Service',shifts:['D2','D2','W/OFF','W/OFF','Holiday','D2','D2','W/OFF','N','N','N','N','W/OFF','W/OFF','D1','D1','D1','D1','D1','W/OFF','W/OFF','Compff','N','N','N','N','N','W/OFF','D2','D2','D2','D2','D2','W/OFF','W/OFF']},
  {id:'SM2333',name:'Kulasekar Baskar',primary:'Operations',shifts:['N','N','W/OFF','W/OFF','Holiday','N','N','N','W/OFF','D2','D2','W/OFF','D2','D2','D2','D2','D2','W/OFF','W/OFF','D1','D1','Compff','W/OFF','D1','D1','W/OFF','W/OFF','N','N','N','N','N','W/OFF','D1','D1']},
  {id:'SM2332',name:'Seenivasan Lakshmipathy',primary:'Customer Service',shifts:['D1','D1','W/OFF','W/OFF','D1','D1','D1','D1','D1','Compff','W/OFF','W/OFF','N','N','N','N','N','W/OFF','W/OFF','D2','D2','Compff','W/OFF','D2','D2','D2','W/OFF','W/OFF','D1','D1','D1','W/OFF','N','N','N']},
  {id:'SM2331',name:'Vinothraj Vijayakumar',primary:'Customer Service',shifts:['N','N','N','N','N','W/OFF','W/OFF','D2','D2','Compff','W/OFF','D1','D1','D1','W/OFF','Holiday','W/OFF','N','N','N','N','N','W/OFF','D2','D2','W/OFF','D2','D2','D2','D2','W/OFF','W/OFF','D2','D2','D2']}
];

const LGND=[
  {key:'D1',label:'Morning',cls:'sp-D1'},
  {key:'D2',label:'Afternoon',cls:'sp-D2'},
  {key:'D4',label:'Day',cls:'sp-D4'},
  {key:'D5',label:'Evening',cls:'sp-D5'},
  {key:'N',label:'Night',cls:'sp-N'},
  {key:'W/OFF',label:'Week Off',cls:'sp-WOFF'},
  {key:'Holiday',label:'Holiday',cls:'sp-HOL'},
  {key:'Compff',label:'Comp Off',cls:'sp-COMP'}
];

document.getElementById('ap-legend').innerHTML=LGND.map(l=>
  `<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#2a6090;font-weight:600;">
    <span class="sp-pill ${l.cls}">${l.key}</span>${l.label}
  </span>`).join('');

function getTi(){
  const d=new Date();
  const pad=n=>String(n).padStart(2,'0');
  return PDATES.indexOf(pad(d.getDate())+'-'+pad(d.getMonth()+1)+'-'+d.getFullYear());
}

function spCls(s){
  const v=(s||'').trim().toUpperCase();
  if(v==='D1')return'sp-D1';
  if(v==='D2')return'sp-D2';
  if(v==='D3')return'sp-D3';
  if(v==='D4')return'sp-D4';
  if(v==='D5')return'sp-D5';
  if(v==='N')return'sp-N';
  if(v==='W/OFF')return'sp-WOFF';
  if(v==='HOLIDAY')return'sp-HOL';
  if(v==='COMPFF')return'sp-COMP';
  return'sp-WOFF';
}

window.buildTable=function(team){
  if(!team||!team.length){
    document.getElementById('ap-table').innerHTML='<div style="padding:40px;text-align:center;color:#3a7aaa;">No data available.</div>';
    return;
  }
  const ti=getTi();
  if(ti>=0) document.getElementById('ap-today-lbl').textContent='Today: '+PDATES[ti]+' ('+PDAYS[ti]+')';

  const sq=(document.getElementById('ap-search').value||'').toLowerCase();
  const filtered=sq
    ?team.filter(m=>(m.name||'').toLowerCase().includes(sq)||(m.id||'').toLowerCase().includes(sq))
    :team;

  let hdr='<tr><th class="ap-col-name" rowspan="2">Name</th>';
  PDATES.forEach((d,i)=>{
    const isT=i===ti, isW=PDAYS[i]==='Sat'||PDAYS[i]==='Sun', p=d.split('-');
    hdr+=`<th style="padding:7px 9px;text-align:center;font-size:10px;font-weight:700;white-space:nowrap;border:1px solid #c8dff0;background:${isT?'#d8eeff':'#eef5fc'};color:${isT?'#1a7db5':isW?'#3a7aaa':'#1a7db5'};">${p[0]}/${p[1]}</th>`;
  });
  hdr+='</tr><tr>';
  PDAYS.forEach((d,i)=>{
    const isT=i===ti, isW=d==='Sat'||d==='Sun';
    hdr+=`<th style="font-size:9px;padding:7px 9px;text-align:center;font-weight:700;white-space:nowrap;border:1px solid #c8dff0;background:${isT?'#d8eeff':'#eef5fc'};color:${isT?'#1a7db5':isW?'#3a7aaa':'#1a7db5'};">${d}</th>`;
  });
  hdr+='</tr>';

  const rows=filtered.map(m=>{
    let cells='';
    (m.shifts||[]).forEach((s,i)=>{
      const isT=i===ti;
      cells+=`<td class="${isT?'sp-today-col':''}"><span class="sp-pill ${spCls(s)}${isT?' sp-today-pill':''}">${s||'—'}</span></td>`;
    });
    return`<tr>
      <td class="ap-col-name">
        <div>${m.name}</div>
        <div style="font-size:10px;color:#3a7aaa;margin-top:1px;font-weight:600;">${m.id}</div>
      </td>${cells}
    </tr>`;
  }).join('');

  document.getElementById('ap-table').innerHTML=`<table class="ap-tbl"><thead>${hdr}</thead><tbody>${rows}</tbody></table>`;
};

fetch(API_URL+'?action=getPlanner&t='+Date.now())
  .then(r=>r.json())
  .then(data=>{
    if(data.success&&data.planner&&data.planner.length){
      window._apLastTeam=data.planner;
      if(data.updatedAt){
        const d=new Date(data.updatedAt);
        document.getElementById('ap-updated-lbl').textContent=
          '✅ Updated: '+d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+
          ' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      }
    }else{
      window._apLastTeam=PDEF;
    }
    buildTable(window._apLastTeam);
  })
  .catch(()=>{
    window._apLastTeam=PDEF;
    buildTable(PDEF);
    document.getElementById('ap-updated-lbl').textContent='(offline — showing default)';
  });
</script>
</body>
</html>
