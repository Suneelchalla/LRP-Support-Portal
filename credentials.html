<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Credentials — LRP Support Portal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#eef5fc;display:flex;flex-direction:column;overflow:hidden;}
.topbar{display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:10px 24px;background:#fff;border-bottom:1.5px solid #c8dff0;box-shadow:0 2px 8px rgba(26,90,160,.07);flex-shrink:0;gap:16px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:34px;height:34px;background:linear-gradient(135deg,#1a7db5,#0a3d78);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.brand-title{font-size:13px;font-weight:800;color:#0a3d78;letter-spacing:2px;}
.brand-sub{font-size:10px;color:#2a6090;letter-spacing:1px;font-weight:600;}
.btn-back{font-size:12px;font-weight:700;letter-spacing:1.5px;padding:7px 16px;background:#eef5fc;border:1.5px solid #b8d4ee;border-radius:6px;color:#1a5a90;cursor:pointer;text-transform:uppercase;text-decoration:none;display:inline-block;}
.btn-back:hover{background:#d0e8f8;}
.body{flex:1;overflow-y:auto;padding:22px 26px;}
.section-title{font-size:12px;font-weight:700;color:#1a7db5;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;}
.search-wrap{position:relative;flex:1;}
.search{width:100%;background:#fff;border:1.5px solid #b8d4ee;border-radius:6px;padding:10px 16px 10px 40px;font-size:13px;color:#1a3a5c;outline:none;}
.search:focus{border-color:#1a7db5;}
.search::placeholder{color:#4a8ab5;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;}
.cr-count{font-size:11px;color:#3a7aaa;letter-spacing:1px;white-space:nowrap;font-weight:600;}
.table-wrap{background:#fff;border:1.5px solid #c8dff0;border-radius:10px;overflow-x:auto;box-shadow:0 2px 8px rgba(26,90,160,.05);}
table{width:100%;border-collapse:collapse;}
thead tr{background:#eef5fc;}
th{padding:11px 14px;text-align:left;font-size:11px;font-weight:700;color:#1a7db5;text-transform:uppercase;letter-spacing:1px;border-bottom:1.5px solid #c8dff0;white-space:nowrap;}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid #e4f0fa;color:#2a4a6a;vertical-align:middle;word-break:break-word;}
tr:hover td{background:#f0f8ff;}
tr:last-child td{border-bottom:none;}
.cr-client{font-weight:700;color:#0a3d78;font-size:14px;}
.cr-url a{color:#1a7db5;text-decoration:none;font-size:12px;}
.cr-url a:hover{text-decoration:underline;}
.cr-env{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;}
.env-prod{background:#fde8e8;border:1px solid #f0aaaa;color:#a02020;}
.env-uat{background:#fff3d8;border:1px solid #f5c840;color:#8a6010;}
.env-dev{background:#d4f5e4;border:1px solid #6cd4a0;color:#1a7050;}
.env-staging{background:#e8e8ff;border:1px solid #a8a8f0;color:#3030a0;}
.env-train{background:#d8f0f8;border:1px solid #70c4e0;color:#0a5070;}
.env-train2{background:#d0eaf8;border:1px solid #60b8d8;color:#0a4060;}
.env-ecom{background:#f0d8f8;border:1px solid #d090e8;color:#601080;}
.env-testing{background:#f8f8d0;border:1px solid #d8d840;color:#606010;}
.env-default{background:#f0f0f0;border:1px solid #d0d0d0;color:#666;}
.pw-wrap{display:flex;align-items:center;gap:8px;}
.pw-val{font-size:12px;color:#2a4a6a;letter-spacing:1px;min-width:80px;}
.pw-toggle{background:#eef5fc;border:1.5px solid #a8cce8;border-radius:4px;padding:3px 8px;font-size:10px;font-weight:700;color:#1a5a90;cursor:pointer;white-space:nowrap;}
.pw-toggle:hover{background:#d0e8f8;}
.pw-toggle:disabled{opacity:.5;cursor:not-allowed;}
.cr-copy{background:#d4f5e4;border:1.5px solid #6cd4a0;border-radius:4px;padding:3px 8px;font-size:10px;font-weight:700;color:#1a7050;cursor:pointer;white-space:nowrap;}
.cr-copy:hover{background:#b0ecd4;}
.cr-copy:disabled{opacity:.5;cursor:not-allowed;}
.cr-copy.copied{background:#b0ecd4;border-color:#30b870;}
.cr-loading{text-align:center;padding:60px 20px;color:#3a7aaa;font-size:14px;letter-spacing:1px;font-weight:600;}
.cr-empty{text-align:center;padding:60px 20px;color:#3a7aaa;font-size:14px;font-weight:600;}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <div class="brand-icon">🚢</div>
    <div>
      <div class="brand-title">LRP SUPPORT PORTAL</div>
      <div class="brand-sub">🔐 Client Credentials</div>
    </div>
  </div>
  <div></div>
  <a class="btn-back" href="lrp_portal.html">← Back to Dashboard</a>
</div>
<div class="body">
  <div class="section-title">🔐 Client Login Credentials</div>
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search" id="cr-search" type="text" placeholder="Search by client name..." oninput="filterCredentials()"/>
    </div>
    <span class="cr-count" id="cr-count"></span>
  </div>
  <div class="table-wrap">
    <div id="cr-table-container" class="cr-loading">⏳ Loading credentials...</div>
  </div>
</div>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbxhLoo7EDwZoNg0doTt3IZ5F_dsK5kLJ4w0sWj0BmeA6j1V8gpdYAJZ-aiqWgAHDkytew/exec';
let allCreds=[];

// FIX #6/#7: Read session username from portal login key
function getSessionUsername(){
  try{
    const s=localStorage.getItem('lrp_session');
    if(s){const p=JSON.parse(s);return p.username||'';}
  }catch(e){}
  return '';
}

function ec(e){
  const v=(e||'').toLowerCase();
  if(v==='production')return'env-prod';
  if(v==='uat')return'env-uat';
  if(v==='development')return'env-dev';
  if(v==='staging')return'env-staging';
  if(v==='train 2')return'env-train2';
  if(v==='train')return'env-train';
  if(v==='ecom')return'env-ecom';
  if(v==='testing')return'env-testing';
  return'env-default';
}

function filterCredentials(){
  const q=(document.getElementById('cr-search').value||'').toLowerCase().trim();
  renderCredentials(q?allCreds.filter(c=>(c.clientName||'').toLowerCase().includes(q)):allCreds,allCreds.length);
}

function renderCredentials(list,total){
  const cnt=document.getElementById('cr-count');
  if(!list.length){
    cnt.textContent='0 results';
    document.getElementById('cr-table-container').innerHTML='<div class="cr-empty">🔍 No clients found.</div>';
    return;
  }
  cnt.textContent=total?list.length+' of '+total+' clients':list.length+' clients';
  // FIX #7: Passwords are NOT embedded anywhere in the HTML.
  // Only the credential ID is stored per row.
  // Show/Copy call the server at click-time with the agent session username.
  const rows=list.map((c,i)=>`
    <tr>
      <td class="cr-client">🏢 ${c.clientName||'—'}</td>
      <td class="cr-url">${c.appUrl?`<a href="${c.appUrl}" target="_blank">🔗 ${c.appUrl}</a>`:'—'}</td>
      <td><span class="cr-env ${ec(c.environment)}">${c.environment||'—'}</span></td>
      <td>${c.userId||'—'}</td>
      <td>
        <div class="pw-wrap">
          <span class="pw-val" id="pw-val-${i}">••••••••</span>
          <button class="pw-toggle" id="pw-btn-${i}" onclick="togglePw('${c.id}',${i})">👁 Show</button>
          <button class="cr-copy" id="copy-btn-${i}" onclick="copyPw('${c.id}',${i})">📋 Copy</button>
        </div>
      </td>
    </tr>`).join('');
  document.getElementById('cr-table-container').innerHTML=`
    <table>
      <thead><tr>
        <th>Client Name</th><th>App URL</th><th>Environment</th><th>User ID</th><th>Password</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// FIX #7: Passwords fetched on-demand from server, cached in memory only (never DOM/localStorage)
const _pwCache=new Map();

async function fetchPassword(credId){
  if(_pwCache.has(credId))return _pwCache.get(credId);
  const username=getSessionUsername();
  if(!username)return null;
  try{
    const res=await fetch(`${API_URL}?action=revealPassword&id=${encodeURIComponent(credId)}&username=${encodeURIComponent(username)}`);
    const data=await res.json();
    if(data.success){
      _pwCache.set(credId,data.password);
      return data.password;
    }
  }catch(e){}
  return null;
}

async function togglePw(credId,i){
  const el=document.getElementById('pw-val-'+i);
  const btn=document.getElementById('pw-btn-'+i);
  if(el.textContent!=='••••••••'){
    el.textContent='••••••••';
    btn.textContent='👁 Show';
    return;
  }
  btn.disabled=true;btn.textContent='⏳';
  const pw=await fetchPassword(credId);
  btn.disabled=false;
  if(pw===null){btn.textContent='⚠ Error';setTimeout(()=>{btn.textContent='👁 Show';},2000);return;}
  el.textContent=pw;
  btn.textContent='🙈 Hide';
}

async function copyPw(credId,i){
  const btn=document.getElementById('copy-btn-'+i);
  btn.disabled=true;btn.textContent='⏳';
  const pw=await fetchPassword(credId);
  btn.disabled=false;
  if(pw===null){btn.textContent='⚠ Error';setTimeout(()=>{btn.textContent='📋 Copy';},2000);return;}
  try{
    await navigator.clipboard.writeText(pw);
    btn.textContent='✅ Copied';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='📋 Copy';btn.classList.remove('copied');},2000);
  }catch(e){
    btn.textContent='⚠ Failed';setTimeout(()=>{btn.textContent='📋 Copy';},2000);
  }
}

(async function(){
  try{
    const res=await fetch(API_URL+'?action=getCredentials&t='+Date.now());
    const data=await res.json();
    if(data.success){allCreds=data.credentials||[];renderCredentials(allCreds);}
    else document.getElementById('cr-table-container').innerHTML='<div class="cr-empty">⚠ Failed to load credentials.</div>';
  }catch{
    document.getElementById('cr-table-container').innerHTML='<div class="cr-empty">⚠ Connection error. Please check your network.</div>';
  }
})();
</script>
</body>
</html>
