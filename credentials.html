<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Credentials — LRP Support Portal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#eef5fc;display:flex;flex-direction:column;overflow:hidden;}
.topbar{display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:10px 24px;background:#fff;border-bottom:1.5px solid #c8dff0;box-shadow:0 2px 8px rgba(26,90,160,.07);flex-shrink:0;gap:16px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:34px;height:34px;background:linear-gradient(135deg,#1a7db5,#0a3d78);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.brand-title{font-size:13px;font-weight:800;color:#0a3d78;letter-spacing:2px;}
.brand-sub{font-size:10px;color:#2a6090;letter-spacing:1px;font-weight:600;}
.btn-back{font-size:12px;font-weight:700;letter-spacing:1.5px;padding:7px 16px;background:#eef5fc;border:1.5px solid #b8d4ee;border-radius:6px;color:#1a5a90;cursor:pointer;text-transform:uppercase;text-decoration:none;display:inline-block;}
.btn-back:hover{background:#d0e8f8;}
.body{flex:1;overflow-y:auto;padding:20px 26px;}

/* ── CLIENT SELECTOR CARD ── */
.selector-card{background:#fff;border:1.5px solid #c8dff0;border-radius:12px;padding:20px 24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(26,90,160,.06);}
.selector-label{font-size:11px;font-weight:700;color:#1a7db5;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.selector-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}

/* Custom dropdown */
.cr-dropdown-wrap{position:relative;flex:1;max-width:380px;}
.cr-dropdown-btn{width:100%;background:#f0f7ff;border:1.5px solid #b8d4ee;border-radius:8px;padding:10px 14px;font-size:14px;font-weight:600;color:#1a3a5c;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;transition:border-color .2s;user-select:none;}
.cr-dropdown-btn:hover,.cr-dropdown-btn.open{border-color:#1a7db5;background:#fff;}
.cr-dropdown-btn .arrow{font-size:11px;color:#3a7aaa;transition:transform .2s;flex-shrink:0;}
.cr-dropdown-btn.open .arrow{transform:rotate(180deg);}
.cr-dropdown-btn .selected-text{flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cr-dropdown-menu{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid #b8d4ee;border-radius:10px;box-shadow:0 8px 28px rgba(26,90,160,.14);z-index:200;display:none;max-height:320px;overflow:hidden;flex-direction:column;}
.cr-dropdown-menu.open{display:flex;}
.cr-dropdown-search-wrap{padding:10px 12px;border-bottom:1px solid #ddeeff;flex-shrink:0;}
.cr-dropdown-search{width:100%;background:#f4f9ff;border:1.5px solid #b8d4ee;border-radius:6px;padding:7px 10px 7px 32px;font-size:13px;color:#1a3a5c;outline:none;}
.cr-dropdown-search:focus{border-color:#1a7db5;background:#fff;}
.cr-dropdown-search-icon{position:absolute;left:22px;top:50%;transform:translateY(10px);font-size:13px;pointer-events:none;color:#3a7aaa;}
.cr-dropdown-list{overflow-y:auto;flex:1;}
.cr-dropdown-opt{padding:10px 14px;font-size:13px;font-weight:600;color:#1a3a5c;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .12s;}
.cr-dropdown-opt:hover{background:#eef5fc;}
.cr-dropdown-opt.selected{background:#ddeeff;color:#0a3d78;}
.cr-dropdown-opt .opt-icon{font-size:15px;flex-shrink:0;}
.cr-dropdown-opt .opt-name{flex:1;}
.cr-dropdown-opt .opt-count{font-size:10px;font-weight:700;background:#1a7db5;color:#fff;border-radius:10px;padding:2px 7px;flex-shrink:0;}
.cr-dropdown-opt.dimmed{color:#aaa;pointer-events:none;font-style:italic;padding:8px 14px;font-size:12px;}
.cr-dropdown-opt.no-results{color:#aaa;pointer-events:none;font-style:italic;text-align:center;padding:16px;}

.selector-hint{font-size:12px;color:#3a7aaa;font-weight:600;}

/* ── EMPTY / PLACEHOLDER STATE ── */
.empty-state{text-align:center;padding:52px 20px;}
.empty-icon{font-size:52px;margin-bottom:14px;}
.empty-title{font-size:16px;font-weight:700;color:#0a3d78;margin-bottom:6px;}
.empty-sub{font-size:13px;color:#3a7aaa;line-height:1.6;}

/* ── CLIENT RESULT PANEL ── */
.result-panel{display:none;}
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.result-client-name{font-size:18px;font-weight:800;color:#0a3d78;letter-spacing:1px;display:flex;align-items:center;gap:8px;}
.result-meta{font-size:12px;color:#3a7aaa;font-weight:600;}
.result-clear-btn{font-size:12px;font-weight:700;letter-spacing:1px;padding:6px 14px;background:#fde8e8;border:1.5px solid #f0aaaa;border-radius:6px;color:#c0392b;cursor:pointer;transition:background .2s;}
.result-clear-btn:hover{background:#f9c8c8;}

/* ── ENV CARDS GRID ── */
.env-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.env-card{background:#fff;border:1.5px solid #c8dff0;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(26,90,160,.06);transition:box-shadow .2s,border-color .2s;}
.env-card:hover{border-color:#1a7db5;box-shadow:0 6px 20px rgba(26,125,181,.12);}
.env-card-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #edf4fb;}
.env-card-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;}
.env-prod   {background:#fde8e8;border:1px solid #f0aaaa;color:#a02020;}
.env-uat    {background:#fff3d8;border:1px solid #f5c840;color:#8a6010;}
.env-dev    {background:#d4f5e4;border:1px solid #6cd4a0;color:#1a7050;}
.env-staging{background:#e8e8ff;border:1px solid #a8a8f0;color:#3030a0;}
.env-train  {background:#d8f0f8;border:1px solid #70c4e0;color:#0a5070;}
.env-train2 {background:#d0eaf8;border:1px solid #60b8d8;color:#0a4060;}
.env-ecom   {background:#f0d8f8;border:1px solid #d090e8;color:#601080;}
.env-testing{background:#f8f8d0;border:1px solid #d8d840;color:#606010;}
.env-default{background:#f0f0f0;border:1px solid #d0d0d0;color:#666;}
.env-card-url{font-size:11px;}
.env-card-url a{color:#1a7db5;text-decoration:none;font-weight:600;}
.env-card-url a:hover{text-decoration:underline;}
.env-card-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.env-field{display:flex;flex-direction:column;gap:3px;}
.env-field-label{font-size:9px;font-weight:700;letter-spacing:1.5px;color:#3a7aaa;text-transform:uppercase;}
.env-field-value{font-size:13px;font-weight:600;color:#1a3a5c;}
.env-pw-row{display:flex;align-items:center;gap:8px;}
.env-pw-val{font-size:13px;font-weight:600;color:#1a3a5c;letter-spacing:1px;flex:1;}
.pw-toggle{background:#eef5fc;border:1.5px solid #a8cce8;border-radius:5px;padding:4px 10px;font-size:10px;font-weight:700;color:#1a5a90;cursor:pointer;white-space:nowrap;transition:background .15s;}
.pw-toggle:hover{background:#d0e8f8;}
.cr-copy{background:#d4f5e4;border:1.5px solid #6cd4a0;border-radius:5px;padding:4px 10px;font-size:10px;font-weight:700;color:#1a7050;cursor:pointer;white-space:nowrap;transition:background .15s;}
.cr-copy:hover{background:#b0ecd4;}
.cr-copy.copied{background:#b0ecd4;border-color:#30b870;}

.cr-loading{text-align:center;padding:60px 20px;color:#3a7aaa;font-size:14px;font-weight:600;}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <div class="brand-icon">🚢</div>
    <div>
      <div class="brand-title">LRP SUPPORT PORTAL</div>
      <div class="brand-sub">🔐 Client Credentials</div>
    </div>
  </div>
  <div></div>
  <a class="btn-back" href="lrp_portal.html">← Back to Dashboard</a>
</div>

<div class="body">

  <!-- SELECTOR CARD -->
  <div class="selector-card">
    <div class="selector-label">🏢 Select Client</div>
    <div class="selector-row">
      <div class="cr-dropdown-wrap" id="clientDropdownWrap">
        <div class="cr-dropdown-btn" id="clientDropdownBtn" onclick="toggleClientDropdown()">
          <span class="selected-text" id="clientDropdownText">⏳ Loading clients...</span>
          <span class="arrow">▾</span>
        </div>
        <div class="cr-dropdown-menu" id="clientDropdownMenu">
          <div class="cr-dropdown-search-wrap" style="position:relative;">
            <span class="cr-dropdown-search-icon">🔍</span>
            <input class="cr-dropdown-search" id="clientDropdownSearch" type="text"
              placeholder="Search client..." oninput="filterClientDropdown()" autocomplete="off"/>
          </div>
          <div class="cr-dropdown-list" id="clientDropdownList"></div>
        </div>
      </div>
      <span class="selector-hint" id="selectorHint"></span>
    </div>
  </div>

  <!-- LOADING STATE -->
  <div id="globalLoading" class="cr-loading">⏳ Loading credentials...</div>

  <!-- EMPTY / PLACEHOLDER -->
  <div id="emptyState" style="display:none;">
    <div class="empty-state">
      <div class="empty-icon">🏢</div>
      <div class="empty-title">Select a Client</div>
      <div class="empty-sub">Choose a client from the dropdown above to view<br>their login credentials and environments.</div>
    </div>
  </div>

  <!-- RESULT PANEL -->
  <div class="result-panel" id="resultPanel">
    <div class="result-header">
      <div>
        <div class="result-client-name">🏢 <span id="resultClientName"></span></div>
        <div class="result-meta" id="resultMeta"></div>
      </div>
      <button class="result-clear-btn" onclick="clearSelection()">✕ Clear Selection</button>
    </div>
    <div class="env-grid" id="envGrid"></div>
  </div>

</div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbxhLoo7EDwZoNg0doTt3IZ5F_dsK5kLJ4w0sWj0BmeA6j1V8gpdYAJZ-aiqWgAHDkytew/exec';

let allCreds=[];
let clientMap={};        // { clientName: [credObj, ...] }
let selectedClient='';

function getSessionUsername(){
  try{const s=localStorage.getItem('lrp_session');if(s){const p=JSON.parse(s);return p.username||'';}}catch(e){}
  return '';
}

function ec(e){
  const v=(e||'').toLowerCase();
  if(v==='production') return'env-prod';
  if(v==='uat')        return'env-uat';
  if(v==='development')return'env-dev';
  if(v==='staging')    return'env-staging';
  if(v==='train 2')    return'env-train2';
  if(v==='train')      return'env-train';
  if(v==='ecom')       return'env-ecom';
  if(v==='testing')    return'env-testing';
  return'env-default';
}

// ENV sort order so Production always comes first
const ENV_ORDER=['Production','UAT','Staging','Development','Train','Train 2','Ecom','Testing'];
function envSortKey(e){
  const i=ENV_ORDER.findIndex(x=>x.toLowerCase()===(e||'').toLowerCase());
  return i===-1 ? 99 : i;
}

// ── LOAD DATA ──
(async function(){
  try{
    const res=await fetch(API_URL+'?action=getCredentials&t='+Date.now());
    const data=await res.json();
    if(data.success){
      allCreds=data.credentials||[];
      buildClientMap();
      buildClientDropdown();
      document.getElementById('globalLoading').style.display='none';
      document.getElementById('emptyState').style.display='block';
    } else {
      document.getElementById('globalLoading').textContent='⚠ Failed to load credentials.';
    }
  } catch{
    document.getElementById('globalLoading').textContent='⚠ Connection error. Please check your network.';
  }
})();

function buildClientMap(){
  clientMap={};
  allCreds.forEach(c=>{
    const name=(c.clientName||'Unknown').trim();
    if(!clientMap[name]) clientMap[name]=[];
    clientMap[name].push(c);
  });
  // Sort each client's entries by env order
  Object.keys(clientMap).forEach(k=>{
    clientMap[k].sort((a,b)=>envSortKey(a.environment)-envSortKey(b.environment));
  });
}

function buildClientDropdown(){
  const names=Object.keys(clientMap).sort((a,b)=>a.localeCompare(b));
  document.getElementById('clientDropdownText').textContent=
    names.length ? '— Select a client —' : 'No clients available';
  renderDropdownList(names);
}

function renderDropdownList(names){
  const list=document.getElementById('clientDropdownList');
  list.innerHTML='';
  if(!names.length){
    list.innerHTML='<div class="cr-dropdown-opt no-results">No clients found</div>';
    return;
  }
  names.forEach(name=>{
    const count=clientMap[name]?clientMap[name].length:0;
    const div=document.createElement('div');
    div.className='cr-dropdown-opt'+(selectedClient===name?' selected':'');
    div.innerHTML=`<span class="opt-icon">🏢</span><span class="opt-name">${name}</span><span class="opt-count">${count}</span>`;
    div.onclick=()=>selectClient(name);
    list.appendChild(div);
  });
}

function filterClientDropdown(){
  const q=(document.getElementById('clientDropdownSearch').value||'').toLowerCase().trim();
  const names=Object.keys(clientMap).sort((a,b)=>a.localeCompare(b));
  const filtered=q ? names.filter(n=>n.toLowerCase().includes(q)) : names;
  renderDropdownList(filtered);
}

function toggleClientDropdown(){
  const btn=document.getElementById('clientDropdownBtn');
  const menu=document.getElementById('clientDropdownMenu');
  const isOpen=menu.classList.contains('open');
  if(isOpen){
    menu.classList.remove('open');
    btn.classList.remove('open');
  } else {
    menu.classList.add('open');
    btn.classList.add('open');
    document.getElementById('clientDropdownSearch').value='';
    renderDropdownList(Object.keys(clientMap).sort((a,b)=>a.localeCompare(b)));
    setTimeout(()=>document.getElementById('clientDropdownSearch').focus(),80);
  }
}

// Close dropdown when clicking outside
document.addEventListener('click',e=>{
  if(!e.target.closest('#clientDropdownWrap')){
    document.getElementById('clientDropdownMenu').classList.remove('open');
    document.getElementById('clientDropdownBtn').classList.remove('open');
  }
});

function selectClient(name){
  selectedClient=name;
  // Update button text
  document.getElementById('clientDropdownText').textContent=name;
  // Close dropdown
  document.getElementById('clientDropdownMenu').classList.remove('open');
  document.getElementById('clientDropdownBtn').classList.remove('open');
  // Show results
  showClientResults(name);
}

function clearSelection(){
  selectedClient='';
  document.getElementById('clientDropdownText').textContent='— Select a client —';
  document.getElementById('resultPanel').style.display='none';
  document.getElementById('emptyState').style.display='block';
  document.getElementById('selectorHint').textContent='';
}

function showClientResults(name){
  const creds=clientMap[name]||[];
  document.getElementById('emptyState').style.display='none';
  document.getElementById('resultPanel').style.display='block';
  document.getElementById('resultClientName').textContent=name;
  document.getElementById('resultMeta').textContent=
    creds.length+' environment'+(creds.length!==1?'s':'');
  document.getElementById('selectorHint').textContent=
    '✅ '+creds.length+' record'+(creds.length!==1?'s':'')+' found';

  const grid=document.getElementById('envGrid');
  grid.innerHTML='';

  creds.forEach((c,i)=>{
    const card=document.createElement('div');
    card.className='env-card';
    card.innerHTML=`
      <div class="env-card-head">
        <span class="env-card-badge ${ec(c.environment)}">${c.environment||'—'}</span>
        <span class="env-card-url">${c.appUrl?`<a href="${c.appUrl}" target="_blank">🔗 Open App</a>`:'<span style="color:#aaa;font-size:11px;">No URL</span>'}</span>
      </div>
      <div class="env-card-body">
        <div class="env-field">
          <div class="env-field-label">User ID</div>
          <div class="env-field-value">${c.userId||'—'}</div>
        </div>
        <div class="env-field">
          <div class="env-field-label">Password</div>
          <div class="env-pw-row">
            <span class="env-pw-val" id="pw-val-${i}">••••••••</span>
            <button class="pw-toggle" id="pw-btn-${i}" onclick="togglePw('${c.id}',${i})">👁 Show</button>
            <button class="cr-copy" id="copy-btn-${i}" onclick="copyPw('${c.id}',${i})">📋 Copy</button>
          </div>
        </div>
        ${c.appUrl?`<div class="env-field"><div class="env-field-label">App URL</div><div class="env-field-value" style="font-size:11px;word-break:break-all;color:#1a7db5;">${c.appUrl}</div></div>`:''}
      </div>`;
    grid.appendChild(card);
  });
}

// ── PASSWORD FETCH (same secure pattern as original) ──
const _pwCache=new Map();

async function fetchPassword(credId){
  if(_pwCache.has(credId)) return _pwCache.get(credId);
  const username=getSessionUsername();
  if(!username) return null;
  try{
    const res=await fetch(`${API_URL}?action=revealPassword&id=${encodeURIComponent(credId)}&username=${encodeURIComponent(username)}`);
    const data=await res.json();
    if(data.success){_pwCache.set(credId,data.password);return data.password;}
  }catch(e){}
  return null;
}

async function togglePw(credId,i){
  const el=document.getElementById('pw-val-'+i);
  const btn=document.getElementById('pw-btn-'+i);
  if(el.textContent!=='••••••••'){
    el.textContent='••••••••';
    btn.textContent='👁 Show';
    return;
  }
  btn.disabled=true; btn.textContent='⏳';
  const pw=await fetchPassword(credId);
  btn.disabled=false;
  if(pw===null){btn.textContent='⚠ Error';setTimeout(()=>{btn.textContent='👁 Show';},2000);return;}
  el.textContent=pw;
  btn.textContent='🙈 Hide';
}

async function copyPw(credId,i){
  const btn=document.getElementById('copy-btn-'+i);
  btn.disabled=true; btn.textContent='⏳';
  const pw=await fetchPassword(credId);
  btn.disabled=false;
  if(pw===null){btn.textContent='⚠ Error';setTimeout(()=>{btn.textContent='📋 Copy';},2000);return;}
  try{
    await navigator.clipboard.writeText(pw);
    btn.textContent='✅ Copied'; btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='📋 Copy';btn.classList.remove('copied');},2000);
  }catch(e){
    btn.textContent='⚠ Failed';setTimeout(()=>{btn.textContent='📋 Copy';},2000);
  }
}
</script>
</body>
</html>
