<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LRP Support Portal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚢</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#eef5fc;min-height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center; }
  .scene{position:fixed;inset:0;overflow:hidden;}
  .ocean-bg{position:absolute;inset:0;background:linear-gradient(180deg,#b8e0f7 0%,#7ec8e3 35%,#1a7db5 60%,#1056a0 80%,#0a3d78 100%);}
  .sky-sun{position:absolute;top:40px;right:120px;width:72px;height:72px;border-radius:50%;cursor:pointer;z-index:10;transition:all .8s cubic-bezier(.4,0,.2,1);}
  .sky-sun.sun-mode{background:radial-gradient(circle,#fff9c4 30%,#ffe57f 60%,rgba(255,220,80,0) 100%);box-shadow:0 0 40px 10px rgba(255,220,80,.3);animation:sunPulse 4s ease-in-out infinite;}
  .sky-sun.moon-mode{background:radial-gradient(circle at 35% 35%,#e8e8ff 30%,#b0b8d8 70%,rgba(150,160,200,0) 100%);box-shadow:0 0 30px 8px rgba(150,160,255,.25);animation:moonPulse 4s ease-in-out infinite;}
  @keyframes sunPulse{0%,100%{opacity:.9;transform:scale(1);}50%{opacity:1;transform:scale(1.06);}}
  @keyframes moonPulse{0%,100%{opacity:.85;transform:scale(1);}50%{opacity:1;transform:scale(1.04);}}
  .scene .ocean-bg{transition:background 1s ease;}
  .scene .ocean-bg.dark{background:linear-gradient(180deg,#080c1a 0%,#0d1530 25%,#0a1a3d 55%,#060e24 80%,#020810 100%);}
  .stars{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 1.2s ease;}
  .ocean-bg.dark .stars{opacity:1;}
  .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle linear infinite;}
  @keyframes twinkle{0%,100%{opacity:.2;}50%{opacity:1;}}
  .wave1,.wave2,.wave3{transition:background .8s;}
  .ocean-bg.dark .wave1{background:rgba(100,140,255,.18);}
  .ocean-bg.dark .wave2{background:rgba(80,120,220,.12);}
  .ocean-bg.dark .wave3{background:rgba(60,100,200,.07);}
  .panel{transition:background .8s,border-color .8s,box-shadow .8s;}
  .panel.dark{background:rgba(10,18,40,.92);border:1px solid rgba(80,120,255,.3);box-shadow:0 12px 40px rgba(0,0,80,.6);}
  .panel.dark .brand-text h1{color:#a0c4ff;}
  .panel.dark .brand-text p{color:#5070a0;}
  .panel.dark .form-group label{color:#6090d0;}
  .panel.dark .form-group input{background:#0d1a35;border-color:#2a3d6a;color:#c0d8ff;}
  .panel.dark .form-group input::placeholder{color:#3a5080;}
  .panel.dark .form-group input:focus{border-color:#4a80e8;background:#101e3a;}
  .panel.dark .btn-primary{background:linear-gradient(135deg,#2a5aaa,#1a3a7a);}
  .panel.dark .access-note{color:#4a7ab0;}
  .panel.dark .divider{background:linear-gradient(90deg,transparent,#2a4a80,transparent);}
  .ocean-surface{position:absolute;bottom:0;left:0;right:0;height:55%;}
  .wave{position:absolute;width:200%;height:80px;left:-50%;}
  .wave1{bottom:46%;background:rgba(255,255,255,.22);border-radius:50% 50% 0 0/40px 40px 0 0;animation:waveDrift 7s ease-in-out infinite;}
  .wave2{bottom:44%;background:rgba(255,255,255,.14);border-radius:50% 50% 0 0/30px 30px 0 0;animation:waveDrift 9s ease-in-out infinite reverse;}
  .wave3{bottom:40%;background:rgba(255,255,255,.08);border-radius:50% 50% 0 0/20px 20px 0 0;animation:waveDrift 11s ease-in-out infinite;}
  @keyframes waveDrift{0%,100%{transform:translateX(0);}50%{transform:translateX(5%);}}
  .boat{position:absolute;bottom:46.5%;left:50%;transform:translateX(-50%);animation:boatBob 3.5s ease-in-out infinite;}
  @keyframes boatBob{0%,100%{transform:translateX(-50%) translateY(0) rotate(-1deg);}50%{transform:translateX(-50%) translateY(-6px) rotate(1.5deg);}}
  .boat-hull{width:160px;height:30px;background:linear-gradient(180deg,#e8a020,#c07010);border-radius:0 0 50% 50%/0 0 20px 20px;position:relative;box-shadow:0 4px 12px rgba(0,0,0,.25);}
  .boat-deck{width:160px;height:10px;background:#f5c040;border-radius:4px 4px 0 0;}
  .boat-cabin{width:48px;height:24px;background:#fff;border:2px solid #d0d0d0;border-radius:4px 4px 0 0;position:absolute;top:-34px;left:56px;}
  .boat-cabin-window{width:12px;height:10px;background:#7ec8e3;border-radius:2px;position:absolute;top:6px;left:8px;}
  .boat-cabin-window2{width:12px;height:10px;background:#7ec8e3;border-radius:2px;position:absolute;top:6px;right:8px;}
  .boat-mast{width:3px;height:60px;background:#8b5e3c;position:absolute;top:-94px;left:78px;}
  .boat-flag{width:20px;height:12px;background:#e03030;clip-path:polygon(0 0,100% 20%,0 100%);position:absolute;top:-94px;left:81px;}
  .containers{position:absolute;top:-52px;left:8px;display:flex;gap:2px;}
  .cbox{width:22px;height:18px;border-radius:2px;border:1.5px solid rgba(0,0,0,.15);}
  .cb1{background:#e53935;}.cb2{background:#1e88e5;}.cb3{background:#43a047;}.cb4{background:#fb8c00;}.cb5{background:#8e24aa;}
  .panel-wrap{position:relative;z-index:100;width:100%;max-width:400px;padding:16px;}
  .panel{background:rgba(255,255,255,.93);border:1px solid rgba(255,255,255,.7);border-radius:16px;padding:32px;backdrop-filter:blur(14px);box-shadow:0 12px 40px rgba(10,60,120,.2);text-align:center;}
  .login-logo{width:52px;height:52px;background:linear-gradient(135deg,#1a7db5,#0a3d78);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px;}
  .brand-text h1{font-size:17px;font-weight:800;color:#0a3d78;letter-spacing:2px;margin-bottom:3px;}
  .brand-text p{font-size:11px;color:#2a6090;letter-spacing:1px;margin-bottom:22px;font-weight:600;}
  .divider{height:1px;background:linear-gradient(90deg,transparent,#c8dff0,transparent);margin:0 0 20px;}
  .form-group{margin-bottom:13px;text-align:left;}
  .form-group label{display:block;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#1a7db5;margin-bottom:5px;}
  .input-wrap{position:relative;display:flex;align-items:center;}
  .input-icon{position:absolute;left:11px;font-size:14px;opacity:.6;z-index:1;}
  .form-group input{width:100%;background:#f0f7ff;border:1.5px solid #b8d4ee;border-radius:8px;padding:10px 12px 10px 36px;font-size:13px;color:#1a3a5c;outline:none;transition:border-color .3s;}
  .form-group input::placeholder{color:#4a8ab5;}
  .form-group input:focus{border-color:#1a7db5;background:#fff;}
  .btn-primary{width:100%;margin-top:6px;padding:12px;background:linear-gradient(135deg,#1a7db5,#0a3d78);border:none;border-radius:8px;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#fff;cursor:pointer;transition:opacity .2s;}
  .btn-primary:hover{opacity:.88;}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;}
  .msg{margin-top:8px;padding:8px 12px;border-radius:6px;font-size:12px;font-weight:600;letter-spacing:1px;display:none;text-align:left;}
  .msg.error{background:#fde8e8;border-left:3px solid #e04040;color:#a02020;}
  .msg.success{background:#d4f5e4;border-left:3px solid #30b870;color:#1a7050;}
  .msg.loading{background:#e4f0ff;border-left:3px solid #1a7db5;color:#1a5a90;}
  .access-note{text-align:center;margin-top:16px;font-size:11px;color:#3a7aaa;letter-spacing:1px;line-height:1.6;font-weight:600;}
</style>
</head>
<body>
<div class="scene">
  <div class="ocean-bg" id="loginOceanBg">
    <div class="stars" id="loginStars"></div>
    <div class="sky-sun sun-mode" id="loginSun" onclick="toggleLoginDark()" title="Toggle dark mode"></div>
    <div class="ocean-surface">
      <div class="wave wave1"></div><div class="wave wave2"></div><div class="wave wave3"></div>
    </div>
    <div class="boat">
      <div style="position:relative;">
        <div class="boat-mast"></div><div class="boat-flag"></div>
        <div class="boat-cabin"><div class="boat-cabin-window"></div><div class="boat-cabin-window2"></div></div>
        <div class="containers"><div class="cbox cb1"></div><div class="cbox cb2"></div><div class="cbox cb3"></div><div class="cbox cb4"></div><div class="cbox cb5"></div></div>
        <div class="boat-deck"></div><div class="boat-hull"></div>
      </div>
    </div>
  </div>
</div>
<div class="panel-wrap" id="panelWrap">
  <div class="panel">
    <div class="login-logo">🚢</div>
    <div class="brand-text"><h1>LRP SUPPORT PORTAL</h1><p>AGENT ACCESS</p></div>
    <div class="divider"></div>
    <div class="form-group"><label>Username</label><div class="input-wrap"><span class="input-icon">👤</span><input type="text" id="login-user" placeholder="Enter your username" autocomplete="off"/></div></div>
    <div class="form-group"><label>Password</label><div class="input-wrap"><span class="input-icon">🔒</span><input type="password" id="login-pass" placeholder="••••••••••"/></div></div>
    <div id="login-msg" class="msg"></div>
    <button class="btn-primary" id="login-btn" onclick="handleLogin()">⚓ SIGN IN</button>
    <div class="access-note">🛡️ Access is provided by your administrator.<br>Contact admin if you need an account.</div>
  </div>
</div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbxhyO1pVbA_TeGsoD7kKAwHHxhMyitT7XN41y0f_1m28LWMaJ-7Rlo3fDPx9j10dnA2Tw/exec';

// ── Global sign-out defined at top level so onclick="signOut()" always finds it ──
window.signOut = async function(){
  const u = _CURRENT_USER;
  if(u){
    try{ await fetch(API_URL+'?'+new URLSearchParams({action:'agentLogout',username:u})); }catch{}
  }
  // Clear all intervals
  _INTERVALS.forEach(id=>clearInterval(id));
  _INTERVALS.length=0;
  localStorage.removeItem('lrp_session');
  localStorage.removeItem('lrp_quote');
  location.reload();
};

// ── Global chat toggle defined at top level ──
window._toggleChat = function(){
  const panel=document.getElementById('chatPanel');
  if(!panel)return;
  _CHAT_OPEN=!_CHAT_OPEN;
  if(_CHAT_OPEN){ panel.classList.add('open'); document.title='LRP Support Portal'; _loadPresence(); }
  else panel.classList.remove('open');
};
window._renderAgents = function(){ _doRenderAgents(); };
window._openConv    = function(p){ _doOpenConv(p); };
window._sendMsg     = async function(){ await _doSendMsg(); };

// ── Global state ──
let _CURRENT_USER = '';
let _INTERVALS    = [];
let _CHAT_OPEN    = false;
let _CHAT_PEER    = '';
let _CHAT_AGENTS  = [];
let _CHAT_UNREAD  = {};
let _CHAT_MSGS    = [];
let _CHAT_LASTTS  = '';
let _CHAT_POLL    = null;

const AGENT_QUOTES=[
  {text:"Every customer interaction is a chance to turn a problem into loyalty.",author:"LRP Wisdom"},
  {text:"Patience is not the ability to wait, but how you act while you're waiting.",author:"Joyce Meyer"},
  {text:"Your attitude, not your aptitude, will determine your altitude.",author:"Zig Ziglar"},
  {text:"The customer's perception is your reality.",author:"Kate Zabriskie"},
  {text:"Go the extra mile. It's never crowded.",author:"Wayne Dyer"},
  {text:"Small acts of kindness in support create lifelong customers.",author:"LRP Wisdom"},
  {text:"Excellence is not a skill, it's an attitude.",author:"Ralph Marston"},
  {text:"The best time to solve a problem is before the customer notices it.",author:"LRP Wisdom"},
  {text:"Your work is going to fill a large part of your life. Do it with pride.",author:"Steve Jobs"},
  {text:"Don't watch the clock; do what it does. Keep going.",author:"Sam Levenson"},
  {text:"Customers don't expect you to be perfect. They expect you to fix things when they go wrong.",author:"Donald Porter"},
  {text:"A good customer service agent turns a complaint into a compliment.",author:"LRP Wisdom"},
  {text:"The secret of getting ahead is getting started.",author:"Mark Twain"},
  {text:"Success is the sum of small efforts repeated day in and day out.",author:"Robert Collier"},
  {text:"Make each interaction count — someone's day depends on it.",author:"LRP Wisdom"},
  {text:"Treat every customer as if they sign your paycheck — because they do.",author:"LRP Wisdom"},
  {text:"You don't build a business. You build people, and people build the business.",author:"Zig Ziglar"},
  {text:"Believe you can and you're halfway there.",author:"Theodore Roosevelt"},
  {text:"It always seems impossible until it's done.",author:"Nelson Mandela"},
  {text:"Quality is remembered long after the price is forgotten.",author:"Gucci"}
];

function getSessionQuote(){
  const s=localStorage.getItem('lrp_quote');
  if(s)return JSON.parse(s);
  const q=AGENT_QUOTES[Math.floor(Math.random()*AGENT_QUOTES.length)];
  localStorage.setItem('lrp_quote',JSON.stringify(q));
  return q;
}
function showMsg(id,text,type){
  const el=document.getElementById(id);
  el.textContent=text; el.className='msg '+type; el.style.display='block';
}

window.addEventListener('load',function(){
  const saved=localStorage.getItem('lrp_session');
  if(saved){
    try{
      const s=JSON.parse(saved);
      if(s&&s.username&&s.team) showDashboard(s.username,s.team);
    }catch{ localStorage.removeItem('lrp_session'); }
  }
});

async function fetchLocation(){
  try{const r=await fetch('http://ip-api.com/json/?fields=status,city,regionName,country');const d=await r.json();if(d.status==='success'&&d.city){const l=[d.city,d.regionName,d.country].filter(Boolean).join(', ');if(l)return l;}}catch{}
  try{const r=await fetch('https://ipwho.is/');const d=await r.json();if(d.success&&d.city){const l=[d.city,d.region,d.country].filter(Boolean).join(', ');if(l)return l;}}catch{}
  try{const r=await fetch('https://ipapi.co/json/');const d=await r.json();const l=[d.city,d.region,d.country_name].filter(Boolean).join(', ');if(l)return l;}catch{}
  return 'Unknown';
}

async function handleLogin(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value;
  if(!u||!p){showMsg('login-msg','⚠ Enter username and password.','error');return;}
  const btn=document.getElementById('login-btn');
  btn.disabled=true;
  showMsg('login-msg','⏳ Verifying...','loading');
  try{
    const ar=await fetch(API_URL+'?'+new URLSearchParams({action:'adminLogin',username:u,password:p}));
    const ad=await ar.json();
    if(ad.success&&ad.token){
      sessionStorage.setItem('admin_token',ad.token);
      sessionStorage.setItem('admin_token_time',Date.now().toString());
      showMsg('login-msg','✅ Admin access granted','success');
      setTimeout(()=>{ window.location.href='admin.html'; },1000);
      return;
    }
  }catch{}
  const location=await fetchLocation();
  try{
    const res=await fetch(API_URL+'?'+new URLSearchParams({action:'login',username:u,password:p,location}));
    const data=await res.json();
    if(data.success){
      showMsg('login-msg','✅ Identity verified','success');
      localStorage.removeItem('lrp_quote');
      setTimeout(()=>{
        localStorage.setItem('lrp_session',JSON.stringify({username:data.user.username,team:data.user.team}));
        if(data.isDefault) showChangePassword(data.user.username,data.user.team);
        else showDashboard(data.user.username,data.user.team);
      },1200);
    }else{
      showMsg('login-msg','⚠ Invalid credentials — access denied.','error');
      btn.disabled=false;
    }
  }catch{
    showMsg('login-msg','⚠ Connection error. Check network.','error');
    btn.disabled=false;
  }
}

function showChangePassword(username,team){
  document.getElementById('panelWrap').innerHTML=`
  <div class="panel" style="text-align:left;">
    <div style="text-align:center;margin-bottom:16px;">
      <div class="login-logo">🔐</div>
      <div class="brand-text"><h1>SET NEW PASSWORD</h1><p>FIRST TIME LOGIN</p></div>
    </div>
    <div class="divider"></div>
    <div style="background:#fff8e8;border:1.5px solid #f0c840;border-radius:8px;padding:10px 14px;margin-bottom:18px;">
      <div style="font-size:11px;font-weight:700;color:#8a6010;letter-spacing:1px;">⚠ Temporary password detected</div>
      <div style="font-size:12px;color:#5a6a80;margin-top:4px;line-height:1.5;">Your admin has set a temporary password. Please create your personal password to continue.</div>
    </div>
    <div class="form-group"><label>New Password</label><div class="input-wrap"><span class="input-icon">🔐</span><input type="password" id="new-pass" placeholder="Min 6 characters"/></div></div>
    <div class="form-group"><label>Confirm New Password</label><div class="input-wrap"><span class="input-icon">✅</span><input type="password" id="new-confirm" placeholder="Re-enter new password"/></div></div>
    <div id="cpw-msg" class="msg"></div>
    <button class="btn-primary" id="cpw-btn" onclick="submitNewPassword('${username}','${team}')">🔒 SET MY PASSWORD</button>
  </div>`;
}

async function submitNewPassword(username,team){
  const np=document.getElementById('new-pass').value;
  const nc=document.getElementById('new-confirm').value;
  if(!np||!nc){showMsg('cpw-msg','⚠ Both fields are required.','error');return;}
  if(np.length<6){showMsg('cpw-msg','⚠ Password must be ≥ 6 characters.','error');return;}
  if(np!==nc){showMsg('cpw-msg','⚠ Passwords do not match.','error');return;}
  const btn=document.getElementById('cpw-btn');
  btn.disabled=true; showMsg('cpw-msg','⏳ Updating password...','loading');
  try{
    const res=await fetch(API_URL+'?'+new URLSearchParams({action:'changePassword',username,newPassword:np}));
    const data=await res.json();
    if(data.success){ showMsg('cpw-msg','✅ Password set! Entering portal...','success'); setTimeout(()=>showDashboard(username,team),1200); }
    else{ showMsg('cpw-msg','⚠ Failed to update. Try again.','error'); btn.disabled=false; }
  }catch{ showMsg('cpw-msg','⚠ Connection error.','error'); btn.disabled=false; }
}

// ══════════════════════════════════════════════════════════════
//  CHAT HELPERS (defined globally so they survive innerHTML swap)
// ══════════════════════════════════════════════════════════════
const AV_COLS=['av-blue','av-teal','av-purple','av-amber','av-coral','av-pink','av-green'];
function _avCol(n){let h=0;for(let i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))&0xffff;return AV_COLS[h%AV_COLS.length];}
function _ini(n){return n.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function _fmtT(iso){try{return new Date(iso).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}catch{return '';}}
function _esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function _isAdmin(u){return u.isAdmin===true||u.team==='Admin';}

// ── SINGLE combined poll (presence + unread in one call every 45s) ──
// Heartbeat piggybacks on the same cadence — only ONE fetch at a time.
let _pollBusy=false;
async function _combinedPoll(){
  if(_pollBusy)return;
  _pollBusy=true;
  try{
    // 1. Heartbeat (fire-and-forget, no await needed)
    fetch(API_URL+'?'+new URLSearchParams({action:'heartbeat',username:_CURRENT_USER})).catch(()=>{});

    // 2. Presence
    const pr=await fetch(API_URL+'?action=getPresence&t='+Date.now());
    const pd=await pr.json();
    if(pd.success){
      const me=_CURRENT_USER.toLowerCase();
      const onlineOthers=pd.presence.filter(p=>p.online&&p.username.toLowerCase()!==me).length;
      const sub=document.getElementById('chatOnlineCount');
      if(sub)sub.textContent=onlineOthers+' other'+(onlineOthers!==1?'s':'')+' online';
      const cnt=document.getElementById('db-online-count');
      if(cnt)cnt.textContent=onlineOthers+1;
      _CHAT_AGENTS=pd.presence
        .filter(p=>p.username.toLowerCase()!==me)
        .sort((a,b)=>{
          if(a.online&&!b.online)return -1;
          if(!a.online&&b.online)return 1;
          if(_isAdmin(a)&&!_isAdmin(b))return -1;
          if(!_isAdmin(a)&&_isAdmin(b))return 1;
          return a.username.localeCompare(b.username);
        });
      _doRenderAgents();
    }

    // 3. Unread counts
    const ur=await fetch(API_URL+'?'+new URLSearchParams({action:'getUnreadCounts',username:_CURRENT_USER})+'&t='+Date.now());
    const ud=await ur.json();
    if(ud.success){
      _CHAT_UNREAD=ud.counts||{};
      const total=ud.total||0;
      const badge=document.getElementById('chatFabBadge');
      if(badge){ badge.textContent=total>9?'9+':total; badge.style.display=total>0?'flex':'none'; }
      _doRenderAgents();
      document.title=total>0&&!_CHAT_OPEN?'('+total+') LRP Support Portal':'LRP Support Portal';
    }
  }catch{}
  _pollBusy=false;
}

// Separate fast poll only for active conversation messages (every 6s)
async function _msgPoll(){
  if(!_CHAT_PEER||!_CURRENT_USER)return;
  try{
    const params={action:'getMessages',user1:_CURRENT_USER,user2:_CHAT_PEER};
    if(_CHAT_LASTTS)params.since=_CHAT_LASTTS;
    const r=await fetch(API_URL+'?'+new URLSearchParams(params)+'&t='+Date.now());
    const d=await r.json();
    if(d.success&&d.messages&&d.messages.length){
      _CHAT_MSGS=[..._CHAT_MSGS,...d.messages];
      _CHAT_LASTTS=_CHAT_MSGS[_CHAT_MSGS.length-1].sentAt;
      _doRenderMsgs();
    }
  }catch{}
}

function _loadPresence(){ _combinedPoll(); }

function _doRenderAgents(){
  const list=document.getElementById('chatAgentList');
  if(!list)return;
  const q=(document.getElementById('chatSearch')?.value||'').toLowerCase();
  let agents=_CHAT_AGENTS;
  if(q)agents=agents.filter(a=>a.username.toLowerCase().includes(q));
  const admins=agents.filter(a=>_isAdmin(a));
  const regular=agents.filter(a=>!_isAdmin(a));
  const online=regular.filter(a=>a.online);
  const offline=regular.filter(a=>!a.online);
  let html='';
  if(admins.length){ html+=`<div class="chat-section-lbl">Admin</div>`; admins.forEach(a=>html+=_agentHTML(a)); }
  if(online.length){ html+=`<div class="chat-section-lbl" style="margin-top:4px;">Online (${online.length})</div>`; online.forEach(a=>html+=_agentHTML(a)); }
  if(offline.length){ html+=`<div class="chat-section-lbl" style="margin-top:4px;">Offline (${offline.length})</div>`; offline.forEach(a=>html+=_agentHTML(a)); }
  if(!agents.length)html='<div style="font-size:11px;color:#3a7aaa;padding:12px 8px;text-align:center;">No results</div>';
  list.innerHTML=html;
}

function _agentHTML(a){
  const unread=_CHAT_UNREAD[a.username]||0;
  const isActive=a.username.toLowerCase()===_CHAT_PEER.toLowerCase();
  const isAdm=_isAdmin(a);
  const cls=isAdm?'av-admin':_avCol(a.username);
  const initials=isAdm?'AD':_ini(a.username);
  const displayName=isAdm?'⚓ '+a.username:a.username;
  const badge=unread>0&&!isActive?`<span class="chat-unread">${unread>9?'9+':unread}</span>`:'';
  return`<div class="chat-agent-item${isActive?' active':''}" onclick="_openConv('${a.username.replace(/'/g,"\\'")}')">
    <div class="chat-av ${cls}">${initials}<span class="chat-presence ${a.online?'presence-online':'presence-offline'}"></span></div>
    <span class="chat-agent-name">${_esc(displayName)}</span>
    ${badge}
  </div>`;
}

function _doOpenConv(peer){
  _CHAT_PEER=peer; _CHAT_MSGS=[]; _CHAT_LASTTS='';
  _doRenderAgents();
  const pData=_CHAT_AGENTS.find(a=>a.username.toLowerCase()===peer.toLowerCase());
  const isOn=pData?pData.online:false;
  const isAdm=pData?_isAdmin(pData):false;
  const cls=isAdm?'av-admin':_avCol(peer);
  const initials=isAdm?'AD':_ini(peer);
  const displayName=isAdm?'⚓ '+peer:peer;
  const conv=document.getElementById('chatConvArea');
  if(!conv)return;
  conv.innerHTML=`
    <div class="chat-conv-header">
      <div class="chat-av ${cls}" style="width:28px;height:28px;font-size:10px;font-weight:700;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${initials}</div>
      <div style="flex:1;min-width:0;">
        <div class="chat-conv-name">${_esc(displayName)}</div>
        <div class="chat-conv-status ${isOn?'conv-online':'conv-offline'}">${isOn?'● Online':'● Offline'}</div>
      </div>
    </div>
    <div class="chat-messages" id="chatMsgs"><div class="chat-empty"><div class="chat-empty-icon">💬</div>Start the conversation</div></div>
    <div class="chat-input-row">
      <input type="text" id="chatMsgInput" placeholder="Message ${_esc(displayName)}..." onkeydown="if(event.key==='Enter')_sendMsg()"/>
      <button class="chat-send-btn" onclick="_sendMsg()">Send</button>
    </div>`;
  fetch(API_URL+'?'+new URLSearchParams({action:'markRead',username:_CURRENT_USER,sender:peer})).catch(()=>{});
  delete _CHAT_UNREAD[peer];
  // Load full history once
  (async()=>{
    try{
      const r=await fetch(API_URL+'?'+new URLSearchParams({action:'getMessages',user1:_CURRENT_USER,user2:peer})+'&t='+Date.now());
      const d=await r.json();
      if(d.success){ _CHAT_MSGS=d.messages||[]; if(_CHAT_MSGS.length)_CHAT_LASTTS=_CHAT_MSGS[_CHAT_MSGS.length-1].sentAt; _doRenderMsgs(); }
    }catch{}
  })();
  document.getElementById('chatMsgInput')?.focus();
}

function _doRenderMsgs(){
  const box=document.getElementById('chatMsgs');
  if(!box)return;
  if(!_CHAT_MSGS.length){ box.innerHTML='<div class="chat-empty"><div class="chat-empty-icon">💬</div>Start the conversation</div>'; return; }
  const atBottom=box.scrollHeight-box.scrollTop-box.clientHeight<80;
  box.innerHTML=_CHAT_MSGS.map(m=>{
    const mine=m.from.toLowerCase()===_CURRENT_USER.toLowerCase();
    return`<div class="chat-msg ${mine?'mine':'theirs'}">
      <div class="chat-bubble">${_esc(m.message)}</div>
      <div class="chat-msg-time">${_fmtT(m.sentAt)}</div>
    </div>`;
  }).join('');
  if(atBottom||_CHAT_MSGS.length<=5)box.scrollTop=box.scrollHeight;
}

async function _doSendMsg(){
  const input=document.getElementById('chatMsgInput');
  if(!input)return;
  const msg=input.value.trim();
  if(!msg||!_CHAT_PEER)return;
  input.value='';
  // Optimistic render
  const opt={id:'opt-'+Date.now(),from:_CURRENT_USER,to:_CHAT_PEER,message:msg,sentAt:new Date().toISOString(),isRead:false};
  _CHAT_MSGS.push(opt); _CHAT_LASTTS=opt.sentAt; _doRenderMsgs();
  try{ await fetch(API_URL+'?'+new URLSearchParams({action:'sendMessage',fromUser:_CURRENT_USER,toUser:_CHAT_PEER,message:msg})); }catch{}
}

  for(let i=0;i<120;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*2.5+0.8;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*70}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*4}s;`;
    c.appendChild(s);
  }
})();

function toggleLoginDark(){
  loginDark=!loginDark;
  const sun=document.getElementById('loginSun');
  const bg=document.getElementById('loginOceanBg');
  const panel=document.querySelector('.panel');
  if(!sun||!bg)return;
  if(loginDark){sun.classList.replace('sun-mode','moon-mode');bg.classList.add('dark');if(panel)panel.classList.add('dark');}
  else{sun.classList.replace('moon-mode','sun-mode');bg.classList.remove('dark');if(panel)panel.classList.remove('dark');}
}

document.addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin();});
</script>
</body>
</html>
