<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LRP Support Portal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚢</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --rust:#c0441a;--signal-orange:#e8610a; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#eef5fc;min-height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center; }
  .scene{position:fixed;inset:0;overflow:hidden;}
  .ocean-bg{position:absolute;inset:0;background:linear-gradient(180deg,#b8e0f7 0%,#7ec8e3 35%,#1a7db5 60%,#1056a0 80%,#0a3d78 100%);}
  .sky-sun{position:absolute;top:40px;right:120px;width:72px;height:72px;border-radius:50%;cursor:pointer;z-index:10;transition:all .8s cubic-bezier(.4,0,.2,1);}
  .sky-sun.sun-mode{background:radial-gradient(circle,#fff9c4 30%,#ffe57f 60%,rgba(255,220,80,0) 100%);box-shadow:0 0 40px 10px rgba(255,220,80,.3);animation:sunPulse 4s ease-in-out infinite;}
  .sky-sun.moon-mode{background:radial-gradient(circle at 35% 35%,#e8e8ff 30%,#b0b8d8 70%,rgba(150,160,200,0) 100%);box-shadow:0 0 30px 8px rgba(150,160,255,.25);animation:moonPulse 4s ease-in-out infinite;}
  @keyframes sunPulse{0%,100%{opacity:.9;transform:scale(1);}50%{opacity:1;transform:scale(1.06);}}
  @keyframes moonPulse{0%,100%{opacity:.85;transform:scale(1);}50%{opacity:1;transform:scale(1.04);}}
  .scene .ocean-bg{transition:background 1s ease;}
  .scene .ocean-bg.dark{background:linear-gradient(180deg,#080c1a 0%,#0d1530 25%,#0a1a3d 55%,#060e24 80%,#020810 100%);}
  .stars{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 1.2s ease;}
  .ocean-bg.dark .stars{opacity:1;}
  .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle linear infinite;}
  @keyframes twinkle{0%,100%{opacity:.2;}50%{opacity:1;}}
  .cloud{transition:opacity .8s;}
  .ocean-bg.dark .cloud{opacity:.06;}
  .wave1,.wave2,.wave3{transition:background .8s;}
  .ocean-bg.dark .wave1{background:rgba(100,140,255,.18);}
  .ocean-bg.dark .wave2{background:rgba(80,120,220,.12);}
  .ocean-bg.dark .wave3{background:rgba(60,100,200,.07);}
  .panel{transition:background .8s,border-color .8s,box-shadow .8s;}
  .panel.dark{background:rgba(10,18,40,.92);border:1px solid rgba(80,120,255,.3);box-shadow:0 12px 40px rgba(0,0,80,.6);}
  .panel.dark .brand-text h1{color:#a0c4ff;}
  .panel.dark .brand-text p{color:#5070a0;}
  .panel.dark .form-group label{color:#6090d0;}
  .panel.dark .form-group input{background:#0d1a35;border-color:#2a3d6a;color:#c0d8ff;}
  .panel.dark .form-group input::placeholder{color:#3a5080;}
  .panel.dark .form-group input:focus{border-color:#4a80e8;background:#101e3a;}
  .panel.dark .btn-primary{background:linear-gradient(135deg,#2a5aaa,#1a3a7a);}
  .panel.dark .access-note{color:#4a7ab0;}
  .panel.dark .divider{background:linear-gradient(90deg,transparent,#2a4a80,transparent);}
  .clouds{position:absolute;top:40px;width:100%;pointer-events:none;}
  .cloud{position:absolute;background:rgba(255,255,255,.82);border-radius:50px;animation:cloudDrift linear infinite;}
  .cloud::before,.cloud::after{content:'';position:absolute;background:rgba(255,255,255,.82);border-radius:50%;}
  .cloud1{width:120px;height:32px;top:20px;left:-140px;animation-duration:28s;}
  .cloud1::before{width:60px;height:48px;top:-22px;left:20px;}
  .cloud1::after{width:44px;height:36px;top:-16px;left:56px;}
  .cloud2{width:90px;height:24px;top:56px;left:-110px;animation-duration:36s;animation-delay:-14s;}
  .cloud2::before{width:44px;height:36px;top:-18px;left:14px;}
  .cloud2::after{width:34px;height:28px;top:-12px;left:44px;}
  .cloud3{width:110px;height:28px;top:12px;left:-130px;animation-duration:44s;animation-delay:-22s;}
  .cloud3::before{width:52px;height:42px;top:-20px;left:18px;}
  @keyframes cloudDrift{from{left:-160px;}to{left:110%;}}
  .ocean-surface{position:absolute;bottom:0;left:0;right:0;height:55%;}
  .wave{position:absolute;width:200%;height:80px;left:-50%;}
  .wave1{bottom:46%;background:rgba(255,255,255,.22);border-radius:50% 50% 0 0/40px 40px 0 0;animation:waveDrift 7s ease-in-out infinite;}
  .wave2{bottom:44%;background:rgba(255,255,255,.14);border-radius:50% 50% 0 0/30px 30px 0 0;animation:waveDrift 9s ease-in-out infinite reverse;}
  .wave3{bottom:40%;background:rgba(255,255,255,.08);border-radius:50% 50% 0 0/20px 20px 0 0;animation:waveDrift 11s ease-in-out infinite;}
  @keyframes waveDrift{0%,100%{transform:translateX(0);}50%{transform:translateX(5%);}}
  .boat{position:absolute;bottom:46.5%;left:50%;transform:translateX(-50%);animation:boatBob 3.5s ease-in-out infinite;}
  @keyframes boatBob{0%,100%{transform:translateX(-50%) translateY(0) rotate(-1deg);}50%{transform:translateX(-50%) translateY(-6px) rotate(1.5deg);}}
  .boat-hull{width:160px;height:30px;background:linear-gradient(180deg,#e8a020,#c07010);border-radius:0 0 50% 50%/0 0 20px 20px;position:relative;box-shadow:0 4px 12px rgba(0,0,0,.25);}
  .boat-deck{width:160px;height:10px;background:#f5c040;border-radius:4px 4px 0 0;}
  .boat-cabin{width:48px;height:24px;background:#fff;border:2px solid #d0d0d0;border-radius:4px 4px 0 0;position:absolute;top:-34px;left:56px;}
  .boat-cabin-window{width:12px;height:10px;background:#7ec8e3;border-radius:2px;position:absolute;top:6px;left:8px;}
  .boat-cabin-window2{width:12px;height:10px;background:#7ec8e3;border-radius:2px;position:absolute;top:6px;right:8px;}
  .boat-mast{width:3px;height:60px;background:#8b5e3c;position:absolute;top:-94px;left:78px;}
  .boat-flag{width:20px;height:12px;background:#e03030;clip-path:polygon(0 0,100% 20%,0 100%);position:absolute;top:-94px;left:81px;}
  .containers{position:absolute;top:-52px;left:8px;display:flex;gap:2px;}
  .cbox{width:22px;height:18px;border-radius:2px;border:1.5px solid rgba(0,0,0,.15);}
  .cb1{background:#e53935;}.cb2{background:#1e88e5;}.cb3{background:#43a047;}.cb4{background:#fb8c00;}.cb5{background:#8e24aa;}
  .panel-wrap{position:relative;z-index:100;width:100%;max-width:400px;padding:16px;}
  .panel{background:rgba(255,255,255,.93);border:1px solid rgba(255,255,255,.7);border-radius:16px;padding:32px;backdrop-filter:blur(14px);box-shadow:0 12px 40px rgba(10,60,120,.2);text-align:center;}
  .login-logo{width:52px;height:52px;background:linear-gradient(135deg,#1a7db5,#0a3d78);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px;}
  .brand-text h1{font-size:17px;font-weight:800;color:#0a3d78;letter-spacing:2px;margin-bottom:3px;}
  .brand-text p{font-size:11px;color:#2a6090;letter-spacing:1px;margin-bottom:22px;font-weight:600;}
  .divider{height:1px;background:linear-gradient(90deg,transparent,#c8dff0,transparent);margin:0 0 20px;}
  .form-group{margin-bottom:13px;text-align:left;}
  .form-group label{display:block;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#1a7db5;margin-bottom:5px;}
  .input-wrap{position:relative;display:flex;align-items:center;}
  .input-icon{position:absolute;left:11px;font-size:14px;opacity:.6;z-index:1;}
  .form-group input{width:100%;background:#f0f7ff;border:1.5px solid #b8d4ee;border-radius:8px;padding:10px 12px 10px 36px;font-size:13px;color:#1a3a5c;outline:none;transition:border-color .3s;}
  .form-group input::placeholder{color:#4a8ab5;}
  .form-group input:focus{border-color:#1a7db5;background:#fff;}
  .btn-primary{width:100%;margin-top:6px;padding:12px;background:linear-gradient(135deg,#1a7db5,#0a3d78);border:none;border-radius:8px;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#fff;cursor:pointer;transition:opacity .2s;}
  .btn-primary:hover{opacity:.88;}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;}
  .msg{margin-top:8px;padding:8px 12px;border-radius:6px;font-size:12px;font-weight:600;letter-spacing:1px;display:none;text-align:left;}
  .msg.error{background:#fde8e8;border-left:3px solid #e04040;color:#a02020;}
  .msg.success{background:#d4f5e4;border-left:3px solid #30b870;color:#1a7050;}
  .msg.loading{background:#e4f0ff;border-left:3px solid #1a7db5;color:#1a5a90;}
  .access-note{text-align:center;margin-top:16px;font-size:11px;color:#3a7aaa;letter-spacing:1px;line-height:1.6;font-weight:600;}
</style>
</head>
<body>
<div class="scene">
  <div class="ocean-bg" id="loginOceanBg">
    <div class="stars" id="loginStars"></div>
    <div class="sky-sun sun-mode" id="loginSun" onclick="toggleLoginDark()" title="Toggle dark mode"></div>
    <div class="ocean-surface">
      <div class="wave wave1"></div><div class="wave wave2"></div><div class="wave wave3"></div>
    </div>
    <div class="boat">
      <div style="position:relative;">
        <div class="boat-mast"></div><div class="boat-flag"></div>
        <div class="boat-cabin"><div class="boat-cabin-window"></div><div class="boat-cabin-window2"></div></div>
        <div class="containers"><div class="cbox cb1"></div><div class="cbox cb2"></div><div class="cbox cb3"></div><div class="cbox cb4"></div><div class="cbox cb5"></div></div>
        <div class="boat-deck"></div><div class="boat-hull"></div>
      </div>
    </div>
  </div>
</div>
<div class="panel-wrap" id="panelWrap">
  <div class="panel">
    <div class="login-logo">🚢</div>
    <div class="brand-text"><h1>LRP SUPPORT PORTAL</h1><p>AGENT ACCESS</p></div>
    <div class="divider"></div>
    <div class="form-group"><label>Username</label><div class="input-wrap"><span class="input-icon">👤</span><input type="text" id="login-user" placeholder="Enter your username" autocomplete="off"/></div></div>
    <div class="form-group"><label>Password</label><div class="input-wrap"><span class="input-icon">🔒</span><input type="password" id="login-pass" placeholder="••••••••••"/></div></div>
    <div id="login-msg" class="msg"></div>
    <button class="btn-primary" id="login-btn" onclick="handleLogin()">⚓ SIGN IN</button>
    <div class="access-note">🛡️ Access is provided by your administrator.<br>Contact admin if you need an account.</div>
  </div>
</div>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbxHeMgaV389GYgDf8CeFMUVRnC5uuBe9x60e4_wBLuoCjE83158t6AIuapJoTy6TyfzcA/exec';
const AGENT_QUOTES=[
  {text:"Every customer interaction is a chance to turn a problem into loyalty.",author:"LRP Wisdom"},
  {text:"Patience is not the ability to wait, but how you act while you're waiting.",author:"Joyce Meyer"},
  {text:"Your attitude, not your aptitude, will determine your altitude.",author:"Zig Ziglar"},
  {text:"The customer's perception is your reality.",author:"Kate Zabriskie"},
  {text:"Go the extra mile. It's never crowded.",author:"Wayne Dyer"},
  {text:"Small acts of kindness in support create lifelong customers.",author:"LRP Wisdom"},
  {text:"Excellence is not a skill, it's an attitude.",author:"Ralph Marston"},
  {text:"The best time to solve a problem is before the customer notices it.",author:"LRP Wisdom"},
  {text:"Your work is going to fill a large part of your life. Do it with pride.",author:"Steve Jobs"},
  {text:"Don't watch the clock; do what it does. Keep going.",author:"Sam Levenson"},
  {text:"Customers don't expect you to be perfect. They expect you to fix things when they go wrong.",author:"Donald Porter"},
  {text:"A good customer service agent turns a complaint into a compliment.",author:"LRP Wisdom"},
  {text:"The secret of getting ahead is getting started.",author:"Mark Twain"},
  {text:"Success is the sum of small efforts repeated day in and day out.",author:"Robert Collier"},
  {text:"Make each interaction count — someone's day depends on it.",author:"LRP Wisdom"},
  {text:"Treat every customer as if they sign your paycheck — because they do.",author:"LRP Wisdom"},
  {text:"You don't build a business. You build people, and people build the business.",author:"Zig Ziglar"},
  {text:"Believe you can and you're halfway there.",author:"Theodore Roosevelt"},
  {text:"It always seems impossible until it's done.",author:"Nelson Mandela"},
  {text:"Quality is remembered long after the price is forgotten.",author:"Gucci"}
];
function getSessionQuote(){const saved=localStorage.getItem('lrp_quote');if(saved)return JSON.parse(saved);const q=AGENT_QUOTES[Math.floor(Math.random()*AGENT_QUOTES.length)];localStorage.setItem('lrp_quote',JSON.stringify(q));return q;}
function showMsg(id,text,type){const el=document.getElementById(id);el.textContent=text;el.className='msg '+type;el.style.display='block';}

window.addEventListener('load',function(){
  const saved=localStorage.getItem('lrp_session');
  if(saved){
    try{
      const s=JSON.parse(saved);
      if(s&&s.username&&s.team){
        showDashboard(s.username,s.team);
        const lastModule=localStorage.getItem('lrp_active_module');
        if(lastModule){
          setTimeout(function(){
            if(lastModule==='handover'||lastModule==='playbook'){openTool(lastModule);}
            else if(lastModule==='credentials'){openCredentials();}
            else if(lastModule==='planner'){openShiftPlanner();}
            else if(lastModule==='wns'){openWNS();}
          },50);
        }
      }
    }catch{localStorage.removeItem('lrp_session');}
  }
});

async function handleLogin(){
  const u=document.getElementById('login-user').value.trim();const p=document.getElementById('login-pass').value;
  if(!u||!p){showMsg('login-msg','⚠ Enter username and password.','error');return;}
  if(u.toLowerCase()==='admin'&&p==='admin@lrp'){showMsg('login-msg','✅ Admin access granted','success');setTimeout(()=>{window.location.href='admin.html';},1000);return;}
  const btn=document.getElementById('login-btn');btn.disabled=true;showMsg('login-msg','⏳ Verifying...','loading');
  try{
    const res=await fetch(API_URL+'?'+new URLSearchParams({action:'login',username:u,password:p}));
    const data=await res.json();
    if(data.success){
      showMsg('login-msg','✅ Identity verified','success');localStorage.removeItem('lrp_quote');
      setTimeout(()=>{localStorage.setItem('lrp_session',JSON.stringify({username:data.user.username,team:data.user.team}));if(data.isDefault)showChangePassword(data.user.username,data.user.team);else showDashboard(data.user.username,data.user.team);},1200);
    }else{showMsg('login-msg','⚠ Invalid credentials — access denied.','error');btn.disabled=false;}
  }catch{showMsg('login-msg','⚠ Connection error. Check network.','error');btn.disabled=false;}
}

function showChangePassword(username,team){
  document.getElementById('panelWrap').innerHTML='<div class="panel" style="text-align:left;"><div style="text-align:center;margin-bottom:16px;"><div class="login-logo">🔐</div><div class="brand-text"><h1>SET NEW PASSWORD</h1><p>FIRST TIME LOGIN</p></div></div><div class="divider"></div><div style="background:#fff8e8;border:1.5px solid #f0c840;border-radius:8px;padding:10px 14px;margin-bottom:18px;"><div style="font-size:11px;font-weight:700;color:#8a6010;letter-spacing:1px;">⚠ Temporary password detected</div><div style="font-size:12px;color:#5a6a80;margin-top:4px;line-height:1.5;">Your admin has set a temporary password. Please create your personal password to continue.</div></div><div class="form-group"><label>New Password</label><div class="input-wrap"><span class="input-icon">🔐</span><input type="password" id="new-pass" placeholder="Min 6 characters"/></div></div><div class="form-group"><label>Confirm New Password</label><div class="input-wrap"><span class="input-icon">✅</span><input type="password" id="new-confirm" placeholder="Re-enter new password"/></div></div><div id="cpw-msg" class="msg"></div><button class="btn-primary" id="cpw-btn" onclick="submitNewPassword(\''+username+'\',\''+team+'\')">🔒 SET MY PASSWORD</button></div>';
}

async function submitNewPassword(username,team){
  const np=document.getElementById('new-pass').value,nc=document.getElementById('new-confirm').value;
  if(!np||!nc){showMsg('cpw-msg','⚠ Both fields are required.','error');return;}
  if(np.length<6){showMsg('cpw-msg','⚠ Password must be ≥ 6 characters.','error');return;}
  if(np!==nc){showMsg('cpw-msg','⚠ Passwords do not match.','error');return;}
  const btn=document.getElementById('cpw-btn');btn.disabled=true;showMsg('cpw-msg','⏳ Updating password...','loading');
  try{
    const res=await fetch(API_URL+'?'+new URLSearchParams({action:'changePassword',username,newPassword:np}));
    const data=await res.json();
    if(data.success){showMsg('cpw-msg','✅ Password set! Entering portal...','success');setTimeout(()=>showDashboard(username,team),1200);}
    else{showMsg('cpw-msg','⚠ Failed to update. Try again.','error');btn.disabled=false;}
  }catch{showMsg('cpw-msg','⚠ Connection error.','error');btn.disabled=false;}
}

function showDashboard(username,team){
  const q=getSessionQuote();

    const PDEF=[{id:'SM1658',name:'Vignesh Maharajan',primary:'Customer Service',shifts:['D5','D5','D5','D5','Holiday','W/OFF','W/OFF','D5','D5','D5','D5','D5','W/OFF','W/OFF','D5','Holiday','D5','D5','D5','W/OFF','W/OFF','D5','D5','D5','D5','D5','W/OFF','W/OFF','D5','D5','D5','D5','D5','W/OFF','W/OFF']},{id:'SM2045',name:'Akash Nagarathinam',primary:'EMS/EDI',shifts:['D2','D2','D2','D2','D2','W/OFF','W/OFF','Compff','D1','D1','D1','D1','W/OFF','W/OFF','D1','Holiday','D1','D1','D1','W/OFF','W/OFF','D2','D2','D2','D2','D2','W/OFF','W/OFF','D2','D2','D2','D2','D2','W/OFF','W/OFF']},{id:'SM1638',name:'Challa Venkat Suneel',primary:'Operations',shifts:['D4','D4','D4','D4','Holiday','W/OFF','W/OFF','D4','D4','D4','D4','D4','W/OFF','W/OFF','D4','Holiday','D4','D4','D4','W/OFF','W/OFF','D4','D4','D4','D4','D4','W/OFF','W/OFF','D4','D4','D4','D4','D4','W/OFF','W/OFF']},{id:'SM2197',name:'Vinoth Bhoopathy',primary:'Operations',shifts:['D1','D1','D1','D1','Holiday','W/OFF','W/OFF','D2','D2','D2','D2','D2','W/OFF','W/OFF','D2','Holiday','D2','D2','D2','W/OFF','W/OFF','D1','D1','D1','W/OFF','D1','D1','D1','W/OFF','D1','D1','D1','D1','W/OFF','W/OFF']},{id:'SM2335',name:'Vignesh Rajapandi',primary:'Operations',shifts:['D4','D4','D4','D4','Holiday','W/OFF','W/OFF','D4','D4','D4','D4','D4','W/OFF','W/OFF','D4','Holiday','D4','D4','D4','W/OFF','W/OFF','D4','D4','D4','D4','D4','W/OFF','W/OFF','D4','D4','D4','D4','D4','W/OFF','W/OFF']},{id:'SM2145',name:'Rene Claret A',primary:'Customer Service',shifts:['D2','D2','W/OFF','W/OFF','Holiday','D2','D2','W/OFF','N','N','N','N','W/OFF','W/OFF','D1','D1','D1','D1','D1','W/OFF','W/OFF','Compff','N','N','N','N','N','W/OFF','D2','D2','D2','D2','D2','W/OFF','W/OFF']},{id:'SM2333',name:'Kulasekar Baskar',primary:'Operations',shifts:['N','N','W/OFF','W/OFF','Holiday','N','N','N','W/OFF','D2','D2','W/OFF','D2','D2','D2','D2','D2','W/OFF','W/OFF','D1','D1','Compff','W/OFF','D1','D1','W/OFF','W/OFF','N','N','N','N','N','W/OFF','D1','D1']},{id:'SM2332',name:'Seenivasan Lakshmipathy',primary:'Customer Service',shifts:['D1','D1','W/OFF','W/OFF','D1','D1','D1','D1','D1','Compff','W/OFF','W/OFF','N','N','N','N','N','W/OFF','W/OFF','D2','D2','Compff','W/OFF','D2','D2','D2','W/OFF','W/OFF','D1','D1','D1','W/OFF','N','N','N']},{id:'SM2331',name:'Vinothraj Vijayakumar',primary:'Customer Service',shifts:['N','N','N','N','N','W/OFF','W/OFF','D2','D2','Compff','W/OFF','D1','D1','D1','W/OFF','Holiday','W/OFF','N','N','N','N','N','W/OFF','D2','D2','W/OFF','D2','D2','D2','D2','W/OFF','W/OFF','D2','D2','D2']}];
    const LGND=[{key:'D1',label:'Morning',cls:'sp-D1'},{key:'D2',label:'Afternoon',cls:'sp-D2'},{key:'D4',label:'Day',cls:'sp-D4'},{key:'D5',label:'Evening',cls:'sp-D5'},{key:'N',label:'Night',cls:'sp-N'},{key:'W/OFF',label:'Week Off',cls:'sp-WOFF'},{key:'Holiday',label:'Holiday',cls:'sp-HOL'},{key:'Compff',label:'Comp Off',cls:'sp-COMP'}];
    function getTi(){const d=new Date(),pad=n=>String(n).padStart(2,'0');return PDATES.indexOf(pad(d.getDate())+'-'+pad(d.getMonth()+1)+'-'+d.getFullYear());}
    function spCls(s){const v=(s||'').trim().toUpperCase();if(v==='D1')return'sp-D1';if(v==='D2')return'sp-D2';if(v==='D3')return'sp-D3';if(v==='D4')return'sp-D4';if(v==='D5')return'sp-D5';if(v==='N')return'sp-N';if(v==='W/OFF')return'sp-WOFF';if(v==='HOLIDAY')return'sp-HOL';if(v==='COMPFF')return'sp-COMP';return'sp-WOFF';}
    const ov=document.createElement('div');ov.id='planner-overlay';ov.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;background:#eef5fc;font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif;';
    ov.appendChild(makeOverlayBar('&#x1F4C5; Shift Planner',function(){localStorage.removeItem('lrp_active_module');ov.remove();}));
    const body=document.createElement('div');body.style.cssText='flex:1;overflow:auto;padding:16px 22px;';
    body.innerHTML='<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;"><div style="position:relative;"><span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;">&#x1F50D;</span><input id="ap-search" type="text" placeholder="Search name..." style="background:#fff;border:1.5px solid #b8d4ee;border-radius:6px;padding:8px 12px 8px 34px;font-size:13px;color:#1a3a5c;outline:none;width:220px;"/></div><span id="ap-today-lbl" style="font-size:12px;color:#1a7db5;font-weight:700;white-space:nowrap;"></span><span id="ap-updated-lbl" style="font-size:11px;color:#1a8c5c;font-weight:600;white-space:nowrap;"></span></div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;" id="ap-legend"></div><div style="overflow-x:auto;border:1.5px solid #c8dff0;border-radius:10px;background:#fff;box-shadow:0 2px 8px rgba(26,90,160,.05);"><div id="ap-table" style="min-width:1100px;"><div style="padding:40px;text-align:center;color:#3a7aaa;font-size:14px;font-weight:600;">&#x23F3; Loading shift planner...</div></div></div>';
    ov.appendChild(body);document.body.appendChild(ov);
    document.getElementById('ap-legend').innerHTML=LGND.map(l=>'<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#2a6090;font-weight:600;"><span class="sp-pill '+l.cls+'">'+l.key+'</span>'+l.label+'</span>').join('');
    function buildTable(team){
      if(!team||!team.length){document.getElementById('ap-table').innerHTML='<div style="padding:40px;text-align:center;color:#3a7aaa;">No data available.</div>';return;}
      const ti=getTi();if(ti>=0)document.getElementById('ap-today-lbl').textContent='Today: '+PDATES[ti]+' ('+PDAYS[ti]+')';
      const sq=(document.getElementById('ap-search').value||'').toLowerCase();
      const filtered=sq?team.filter(m=>(m.name||'').toLowerCase().includes(sq)||(m.id||'').toLowerCase().includes(sq)):team;
      let hdr='<tr><th class="ap-col-name" rowspan="2">Name</th>';
      PDATES.forEach(function(d,i){const isT=i===ti,isW=PDAYS[i]==='Sat'||PDAYS[i]==='Sun',p=d.split('-');hdr+='<th style="padding:7px 9px;text-align:center;font-size:10px;font-weight:700;white-space:nowrap;border:1px solid #c8dff0;background:'+(isT?'#d8eeff':'#eef5fc')+';color:'+(isT?'#1a7db5':isW?'#3a7aaa':'#1a7db5')+';">'+p[0]+'/'+p[1]+'</th>';});
      hdr+='</tr><tr>';
      PDAYS.forEach(function(d,i){const isT=i===ti,isW=d==='Sat'||d==='Sun';hdr+='<th style="font-size:9px;padding:7px 9px;text-align:center;font-weight:700;white-space:nowrap;border:1px solid #c8dff0;background:'+(isT?'#d8eeff':'#eef5fc')+';color:'+(isT?'#1a7db5':isW?'#3a7aaa':'#1a7db5')+';">'+d+'</th>';});
      hdr+='</tr>';
      const rows=filtered.map(function(m){let cells='';(m.shifts||[]).forEach(function(s,i){const isT=i===ti;cells+='<td class="'+(isT?'sp-today-col':'')+'"><span class="sp-pill '+spCls(s)+(isT?' sp-today-pill':'')+'">'+(s||'—')+'</span></td>';});return'<tr><td class="ap-col-name"><div>'+m.name+'</div><div style="font-size:10px;color:#3a7aaa;margin-top:1px;font-weight:600;">'+m.id+'</div></td>'+cells+'</tr>';}).join('');
      document.getElementById('ap-table').innerHTML='<table class="ap-tbl"><thead>'+hdr+'</thead><tbody>'+rows+'</tbody></table>';
    }
    document.getElementById('ap-search').addEventListener('input',function(){if(window._apLastTeam)buildTable(window._apLastTeam);});
    fetch(API_URL+'?action=getPlanner&t='+Date.now()).then(r=>r.json()).then(function(data){
      if(data.success&&data.planner&&data.planner.length){window._apLastTeam=data.planner;if(data.updatedAt){const d=new Date(data.updatedAt);document.getElementById('ap-updated-lbl').textContent='&#x2705; Updated: '+d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}}else{window._apLastTeam=PDEF;}buildTable(window._apLastTeam);
    }).catch(function(){window._apLastTeam=PDEF;buildTable(PDEF);document.getElementById('ap-updated-lbl').textContent='(offline — showing default)';});
  };
}

function toggleLoginDark(){loginDark=!loginDark;const sun=document.getElementById('loginSun');const bg=document.getElementById('loginOceanBg');const panel=document.querySelector('.panel');if(!sun||!bg)return;if(loginDark){sun.classList.replace('sun-mode','moon-mode');bg.classList.add('dark');if(panel)panel.classList.add('dark');}else{sun.classList.replace('moon-mode','sun-mode');bg.classList.remove('dark');if(panel)panel.classList.remove('dark');}}
