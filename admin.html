<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LRP Support Portal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  :root {
    --ocean-deep: #020f1e; --ocean-mid: #041c35; --ocean-surface: #0a3558;
    --steel: #1a3a5c; --rust: #c0441a; --cargo-red: #8b1a1a;
    --signal-orange: #e8610a; --nav-light-green: #00ff88; --nav-light-red: #ff3344;
    --foam: #a8d8ea; --mist: rgba(168,216,234,0.15); --panel: rgba(4,28,53,0.88); --gold: #f0c040;
  }
  body { font-family: 'Rajdhani', sans-serif; background: var(--ocean-deep); min-height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .scene { position: fixed; inset: 0; overflow: hidden; }
  .sky { position: absolute; inset: 0; background: linear-gradient(180deg,#020810 0%,#041428 25%,#06203f 50%,#0a3558 70%,#1a5c7a 85%,#2a7a96 100%); }
  .stars { position: absolute; inset: 0; background-image: radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,.9) 0%,transparent 100%),radial-gradient(1px 1px at 25% 8%,rgba(255,255,255,.7) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 40% 20%,rgba(255,255,255,.8) 0%,transparent 100%),radial-gradient(1px 1px at 55% 5%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1px 1px at 70% 12%,rgba(255,255,255,.9) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 85% 18%,rgba(255,255,255,.7) 0%,transparent 100%),radial-gradient(1px 1px at 15% 35%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 90% 30%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1px 1px at 5% 45%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 60% 38%,rgba(255,255,255,.5) 0%,transparent 100%); }
  .moon { position: absolute; top: 6%; right: 12%; width: 70px; height: 70px; border-radius: 50%; background: radial-gradient(circle at 35% 35%,#fffae0,#f0d080 40%,#c8a020); box-shadow: 0 0 30px 10px rgba(240,200,80,.3),0 0 80px 30px rgba(240,200,80,.1); }
  .moon-reflection { position: absolute; bottom: 28%; right: 11%; width: 20px; height: 100px; background: linear-gradient(180deg,rgba(240,200,80,.5),transparent); border-radius: 50%; filter: blur(4px); animation: shimmer 3s ease-in-out infinite; }
  @keyframes shimmer { 0%,100%{transform:scaleX(1);opacity:.6} 50%{transform:scaleX(1.8);opacity:.9} }
  .horizon { position: absolute; bottom: 30%; left: 0; right: 0; height: 60px; background: linear-gradient(180deg,transparent,rgba(26,92,122,.6),transparent); }
  .ocean { position: absolute; bottom: 0; left: 0; right: 0; height: 32%; overflow: hidden; }
  .wave-layer { position: absolute; bottom: 0; left: -50%; width: 200%; height: 100%; }
  .wave-layer svg { width: 100%; height: 100%; }
  .wave1 { animation: waveMove 8s linear infinite; opacity: .9; }
  .wave2 { animation: waveMove 12s linear infinite reverse; opacity: .6; bottom: 10px; }
  .wave3 { animation: waveMove 6s linear infinite; opacity: .4; bottom: 20px; }
  @keyframes waveMove { 0%{transform:translateX(0)} 100%{transform:translateX(25%)} }
  .ship-wrapper { position: absolute; bottom: 28%; left: -420px; animation: sailAcross 45s linear infinite; }
  @keyframes sailAcross { 0%{left:-420px} 100%{left:calc(100vw + 50px)} }
  .ship { position: relative; filter: drop-shadow(0 10px 30px rgba(0,0,0,.8)); }
  .ship svg { display: block; }
  .nav-light-port { position: absolute; top: 28px; left: 38px; width: 6px; height: 6px; border-radius: 50%; background: var(--nav-light-red); box-shadow: 0 0 8px 3px rgba(255,51,68,.8); animation: blink 2s ease-in-out infinite; }
  .nav-light-starboard { position: absolute; top: 28px; right: 30px; width: 6px; height: 6px; border-radius: 50%; background: var(--nav-light-green); box-shadow: 0 0 8px 3px rgba(0,255,136,.8); animation: blink 2s ease-in-out infinite 1s; }
  .mast-light { position: absolute; top: 0; left: 50%; width: 8px; height: 8px; border-radius: 50%; background: #fff; box-shadow: 0 0 10px 4px rgba(255,255,255,.9); animation: blink 1.5s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .smoke { position: absolute; top: -30px; left: 52%; }
  .smoke-puff { position: absolute; border-radius: 50%; background: rgba(180,180,180,.3); animation: smokePuff 4s ease-out infinite; }
  .smoke-puff:nth-child(1){width:16px;height:16px;animation-delay:0s}
  .smoke-puff:nth-child(2){width:22px;height:22px;animation-delay:1.3s}
  .smoke-puff:nth-child(3){width:12px;height:12px;animation-delay:2.6s}
  @keyframes smokePuff { 0%{transform:translate(0,0) scale(1);opacity:.6} 100%{transform:translate(-30px,-60px) scale(3);opacity:0} }
  .wake { position: absolute; top: 50%; right: 100%; width: 200px; height: 20px; background: linear-gradient(90deg,transparent,rgba(168,216,234,.4),rgba(168,216,234,.15)); clip-path: polygon(0 50%,100% 30%,100% 70%); transform: translateY(-50%); }
  .lighthouse { position: absolute; bottom: 29%; right: 5%; }
  .lighthouse svg { width: 40px; }
  .lighthouse-beam { position: absolute; top: 2px; left: 50%; width: 0; height: 0; border-left: 60px solid transparent; border-right: 60px solid transparent; border-bottom: 120px solid rgba(255,220,80,.08); transform-origin: center bottom; transform: translateX(-50%); animation: rotate 4s linear infinite; }
  @keyframes rotate { 0%{transform:translateX(-50%) rotate(-20deg);opacity:.8} 50%{transform:translateX(-50%) rotate(20deg);opacity:.2} 100%{transform:translateX(-50%) rotate(-20deg);opacity:.8} }
  .floating-container { position: absolute; border-radius: 3px; opacity: .4; animation: float 6s ease-in-out infinite; }
  .fc1{width:50px;height:20px;background:#8b1a1a;bottom:34%;left:8%;animation-delay:0s}
  .fc2{width:40px;height:16px;background:#1a4a8b;bottom:35%;left:15%;animation-delay:1s}
  .fc3{width:35px;height:14px;background:#1a6b2a;bottom:33%;right:20%;animation-delay:2s}
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  .panel-wrap { position: relative; z-index: 100; width: 420px; }
  .panel { background: var(--panel); border: 1px solid rgba(0,180,255,.25); border-radius: 4px; padding: 36px 40px 32px; backdrop-filter: blur(18px); box-shadow: 0 0 0 1px rgba(0,180,255,.1),0 20px 60px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.05); }
  .panel::before,.panel::after { content: ''; position: absolute; width: 18px; height: 18px; border-color: rgba(0,180,255,.5); border-style: solid; }
  .panel::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
  .panel::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
  .brand-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .brand-icon { width: 42px; height: 42px; background: linear-gradient(135deg,var(--rust),var(--signal-orange)); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 4px 12px rgba(200,80,20,.4); }
  .brand-text h1 { font-family: 'Orbitron',sans-serif; font-size: 15px; font-weight: 900; color: #e0f4ff; letter-spacing: 3px; line-height: 1; }
  .brand-text span { font-family: 'Share Tech Mono',monospace; font-size: 10px; color: rgba(0,200,255,.7); letter-spacing: 2px; }
  .divider { height: 1px; background: linear-gradient(90deg,transparent,rgba(0,180,255,.4),transparent); margin: 14px 0 20px; }
  .tabs { display: flex; border-bottom: 1px solid rgba(0,180,255,.2); margin-bottom: 22px; gap: 4px; }
  .tab { flex: 1; background: none; border: none; padding: 10px 0; font-family: 'Rajdhani',sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: rgba(0,180,255,.5); cursor: pointer; position: relative; transition: color .3s; }
  .tab.active { color: #00c8ff; }
  .tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: linear-gradient(90deg,transparent,#00c8ff,transparent); }
  .form-group { margin-bottom: 16px; position: relative; }
  .form-group label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: rgba(0,180,255,.7); margin-bottom: 6px; }
  .input-wrap { position: relative; display: flex; align-items: center; }
  .input-icon { position: absolute; left: 12px; font-size: 16px; opacity: .6; z-index: 1; }
  .form-group input { width: 100%; background: rgba(2,15,30,.7); border: 1px solid rgba(0,120,180,.35); border-radius: 3px; padding: 11px 12px 11px 38px; font-family: 'Share Tech Mono',monospace; font-size: 13px; color: #a8e8ff; outline: none; transition: border-color .3s,box-shadow .3s; }
  .form-group input::placeholder { color: rgba(100,160,200,.4); }
  .form-group input:focus { border-color: rgba(0,200,255,.7); box-shadow: 0 0 0 3px rgba(0,180,255,.1); }
  .btn-primary { width: 100%; margin-top: 8px; padding: 13px; background: linear-gradient(135deg,#0a4a7a,#0d6fa8); border: 1px solid rgba(0,200,255,.4); border-radius: 3px; font-family: 'Orbitron',sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #a8f0ff; cursor: pointer; transition: all .3s; position: relative; overflow: hidden; }
  .btn-primary::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent); transform: translateX(-100%); transition: transform .4s; }
  .btn-primary:hover::before { transform: translateX(100%); }
  .btn-primary:hover { background: linear-gradient(135deg,#0d6fa8,#14a0d0); box-shadow: 0 0 20px rgba(0,180,255,.3); color: #fff; }
  .btn-primary:active { transform: scale(.98); }
  .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
  .msg { margin-top: 8px; padding: 8px 12px; border-radius: 3px; font-size: 12px; font-weight: 600; letter-spacing: 1px; display: none; }
  .msg.error { background: rgba(180,40,40,.25); border-left: 2px solid #ff4444; color: #ff9999; }
  .msg.success { background: rgba(20,160,80,.2); border-left: 2px solid #00ff88; color: #88ffcc; }
  .msg.loading { background: rgba(0,100,180,.2); border-left: 2px solid #00c8ff; color: #a8e8ff; }
  .modal-overlay { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,.6); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: linear-gradient(135deg,#041c35,#062a4a); border: 1px solid rgba(0,200,255,.4); border-radius: 6px; padding: 36px 40px; text-align: center; max-width: 340px; box-shadow: 0 0 60px rgba(0,180,255,.2); animation: popIn .4s cubic-bezier(.175,.885,.32,1.275); }
  @keyframes popIn { from{transform:scale(.6);opacity:0} to{transform:scale(1);opacity:1} }
  .modal-anchor { font-size: 40px; margin-bottom: 10px; }
  .modal h3 { font-family: 'Orbitron',sans-serif; font-size: 14px; letter-spacing: 3px; color: #00ff88; margin-bottom: 10px; }
  .modal p { font-size: 13px; color: rgba(168,216,234,.8); line-height: 1.6; margin-bottom: 20px; }
  .modal .vessel-id { font-family: 'Share Tech Mono',monospace; font-size: 11px; color: rgba(0,200,255,.7); letter-spacing: 2px; margin-bottom: 20px; padding: 6px 10px; background: rgba(0,0,0,.3); border-radius: 2px; display: inline-block; }
  .modal button { padding: 10px 28px; background: linear-gradient(135deg,#0a4a7a,#0d6fa8); border: 1px solid rgba(0,200,255,.4); border-radius: 3px; font-family: 'Orbitron',sans-serif; font-size: 11px; letter-spacing: 2px; color: #a8f0ff; cursor: pointer; transition: all .3s; }
  .modal button:hover { background: linear-gradient(135deg,#0d6fa8,#14a0d0); color: #fff; }
  .change-pw-box { background: rgba(4,28,53,.95); border: 1px solid rgba(255,160,0,.4); border-radius: 6px; padding: 28px 32px; text-align: center; }
  .change-pw-box h2 { font-family: 'Orbitron',sans-serif; font-size: 13px; letter-spacing: 3px; color: #ffa040; margin-bottom: 8px; }
  .change-pw-box p { font-size: 12px; color: rgba(168,216,234,.7); margin-bottom: 20px; line-height: 1.6; }
  .change-pw-box .form-group { text-align: left; }
</style>
</head>
<body>

<div class="scene">
  <div class="sky"></div>
  <div class="stars"></div>
  <div class="moon"></div>
  <div class="moon-reflection"></div>
  <div class="horizon"></div>
  <div class="lighthouse">
    <div class="lighthouse-beam"></div>
    <svg viewBox="0 0 40 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="14" y="40" width="12" height="35" fill="#1a3a5c"/>
      <rect x="12" y="25" width="16" height="18" fill="#8b3a2a" rx="1"/>
      <rect x="10" y="22" width="20" height="5" fill="#6b2a1a"/>
      <polygon points="14,22 26,22 23,10 17,10" fill="#c0441a"/>
      <rect x="16" y="8" width="8" height="4" fill="#ffd700" opacity=".8"/>
      <rect x="17" y="7" width="6" height="2" fill="#aaa"/>
    </svg>
  </div>
  <div class="floating-container fc1"></div>
  <div class="floating-container fc2"></div>
  <div class="floating-container fc3"></div>
  <div class="ship-wrapper">
    <div class="ship">
      <div class="mast-light"></div>
      <div class="nav-light-port"></div>
      <div class="nav-light-starboard"></div>
      <div class="smoke"><div class="smoke-puff"></div><div class="smoke-puff"></div><div class="smoke-puff"></div></div>
      <div class="wake"></div>
      <svg width="400" height="100" viewBox="0 0 400 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 75 L380 75 L370 90 L30 92 Z" fill="#1a2a3a"/>
        <path d="M10 75 L380 75 L370 88 L30 90 Z" fill="#152030"/>
        <rect x="12" y="72" width="366" height="5" fill="#c0441a"/>
        <rect x="20" y="55" width="355" height="20" fill="#2a3d50" rx="1"/>
        <rect x="30"  y="38" width="48" height="18" fill="#8b1a1a" rx="1"/>
        <rect x="82"  y="38" width="48" height="18" fill="#1a4a8b" rx="1"/>
        <rect x="134" y="38" width="48" height="18" fill="#1a6b2a" rx="1"/>
        <rect x="186" y="38" width="48" height="18" fill="#7a5a10" rx="1"/>
        <rect x="238" y="38" width="48" height="18" fill="#4a1a6b" rx="1"/>
        <rect x="290" y="38" width="48" height="18" fill="#8b1a1a" rx="1"/>
        <rect x="50"  y="22" width="48" height="17" fill="#1a6b2a" rx="1"/>
        <rect x="102" y="22" width="48" height="17" fill="#8b1a1a" rx="1"/>
        <rect x="154" y="22" width="48" height="17" fill="#1a4a8b" rx="1"/>
        <rect x="206" y="22" width="48" height="17" fill="#7a5a10" rx="1"/>
        <rect x="258" y="22" width="48" height="17" fill="#1a6b2a" rx="1"/>
        <rect x="310" y="16" width="55" height="40" fill="#2a4a6a" rx="2"/>
        <rect x="316" y="20" width="18" height="14" fill="rgba(100,200,255,.3)" rx="1"/>
        <rect x="340" y="20" width="18" height="14" fill="rgba(100,200,255,.3)" rx="1"/>
        <rect x="330" y="6" width="14" height="14" fill="#3a3a3a" rx="1"/>
        <rect x="328" y="4" width="18" height="4" fill="#2a2a2a" rx="1"/>
        <line x1="345" y1="0" x2="345" y2="16" stroke="#5a6a7a" stroke-width="2"/>
        <path d="M380 55 L395 62 L390 75 L375 75 L380 55Z" fill="#1a2a3a"/>
      </svg>
    </div>
  </div>
  <div class="ocean">
    <div class="wave-layer wave1"><svg viewBox="0 0 1200 200" preserveAspectRatio="none"><path d="M0,100 C150,40 300,160 450,100 C600,40 750,160 900,100 C1050,40 1150,120 1200,100 L1200,200 L0,200 Z" fill="#0a3558" opacity=".9"/></svg></div>
    <div class="wave-layer wave2"><svg viewBox="0 0 1200 200" preserveAspectRatio="none"><path d="M0,130 C200,70 400,170 600,130 C800,90 1000,170 1200,130 L1200,200 L0,200 Z" fill="#041828" opacity=".7"/></svg></div>
    <div class="wave-layer wave3"><svg viewBox="0 0 1200 200" preserveAspectRatio="none"><path d="M0,140 C150,110 350,165 550,140 C750,115 950,165 1200,140 L1200,200 L0,200 Z" fill="rgba(168,216,234,.08)"/></svg></div>
  </div>
</div>

<div class="panel-wrap">
  <div class="panel">
    <div class="brand-bar">
      <div class="brand-icon">🚢</div>
      <div class="brand-text"><h1>LRP SUPPORT PORTAL</h1></div>
    </div>
    <div class="divider"></div>
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="showTab('login')">⚓ LOGIN</button>
      <button class="tab" id="tab-register" onclick="showTab('register')">📋 REGISTER</button>
    </div>
    <div class="form-view active" id="view-login">
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap"><span class="input-icon">👤</span><input type="text" id="login-user" placeholder="Enter your username"/></div>
      </div>
      <div class="form-group">
        <label>Access Code</label>
        <div class="input-wrap"><span class="input-icon">🔒</span><input type="password" id="login-pass" placeholder="••••••••••"/></div>
      </div>
      <div id="login-msg" class="msg"></div>
      <button class="btn-primary" id="login-btn" onclick="handleLogin()">Sign In</button>
    </div>
    <div class="form-view" id="view-register">
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap"><span class="input-icon">👤</span><input type="text" id="reg-user" placeholder="Choose your username"/></div>
      </div>
      <div class="form-group">
        <label>User Email</label>
        <div class="input-wrap"><span class="input-icon">📡</span><input type="email" id="reg-email" placeholder="user@example.com"/></div>
      </div>
      <div class="form-group">
        <label>Team Name</label>
        <div class="input-wrap"><span class="input-icon">🏴</span><input type="text" id="reg-team" placeholder="e.g. Pacific Fleet Alpha"/></div>
      </div>
      <div class="form-group">
        <label>Set Access Code</label>
        <div class="input-wrap"><span class="input-icon">🔐</span><input type="password" id="reg-pass" placeholder="Min 6 characters"/></div>
      </div>
      <div class="form-group">
        <label>Confirm Access Code</label>
        <div class="input-wrap"><span class="input-icon">✅</span><input type="password" id="reg-confirm" placeholder="Re-enter code"/></div>
      </div>
      <div id="reg-msg" class="msg"></div>
      <button class="btn-primary" id="reg-btn" onclick="handleRegister()">Register</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-anchor">⚓</div>
    <h3>REGISTRATION SUCCESSFUL</h3>
    <p>Welcome, <strong id="modal-name"></strong>!<br>You have been successfully registered.</p>
    <div class="vessel-id" id="modal-id"></div><br>
    <button onclick="closeModal()">🚢 PROCEED TO LOGIN</button>
  </div>
</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbwcR11oAeEKhBozwny6yxYsf5VOnvVCLU_XUbQ3jbNyjZDeW6avgTO5qIf2N64C6Ao1zQ/exec';

  function showTab(t) {
    document.getElementById('view-login').classList.toggle('active', t === 'login');
    document.getElementById('view-register').classList.toggle('active', t === 'register');
    document.getElementById('tab-login').classList.toggle('active', t === 'login');
    document.getElementById('tab-register').classList.toggle('active', t === 'register');
    clearMsgs();
  }
  function clearMsgs() {
    ['login-msg','reg-msg'].forEach(id => { const el = document.getElementById(id); el.style.display='none'; el.className='msg'; el.textContent=''; });
  }
  function showMsg(id, text, type) {
    const el = document.getElementById(id); el.textContent = text; el.className = 'msg ' + type; el.style.display = 'block';
  }

  async function handleRegister() {
    const u = document.getElementById('reg-user').value.trim();
    const e = document.getElementById('reg-email').value.trim();
    const t = document.getElementById('reg-team').value.trim();
    const p = document.getElementById('reg-pass').value;
    const c = document.getElementById('reg-confirm').value;
    if (!u||!e||!t||!p||!c) { showMsg('reg-msg','⚠ ALL FIELDS ARE MANDATORY, OFFICER.','error'); return; }
    if (p.length < 6) { showMsg('reg-msg','⚠ ACCESS CODE MUST BE ≥ 6 CHARACTERS.','error'); return; }
    if (p !== c) { showMsg('reg-msg','⚠ ACCESS CODE MISMATCH — RE-ENTER.','error'); return; }

    const btn = document.getElementById('reg-btn');
    btn.disabled = true;
    showMsg('reg-msg', '⏳ REGISTERING...', 'loading');

    const vesselId = 'VID-' + Math.random().toString(36).toUpperCase().slice(2,8);
    try {
      const params = new URLSearchParams({ action:'register', username:u, email:e, team:t, password:p, vesselId });
      const res = await fetch(API_URL + '?' + params.toString());
      const data = await res.json();
      if (data.success) {
        document.getElementById('modal-name').textContent = u;
        document.getElementById('modal-id').textContent = 'ID: ' + vesselId + ' · TEAM: ' + t;
        document.getElementById('modal').classList.add('show');
        ['reg-user','reg-email','reg-team','reg-pass','reg-confirm'].forEach(id => document.getElementById(id).value = '');
      } else if (data.error === 'USERNAME_EXISTS') {
        showMsg('reg-msg','⚠ CALLSIGN ALREADY REGISTERED — CHOOSE ANOTHER.','error');
      } else {
        showMsg('reg-msg','⚠ REGISTRATION FAILED. TRY AGAIN.','error');
      }
    } catch(err) {
      showMsg('reg-msg','⚠ CONNECTION ERROR. CHECK NETWORK.','error');
    }
    btn.disabled = false;
  }

  function closeModal() { document.getElementById('modal').classList.remove('show'); showTab('login'); }

  async function handleLogin() {
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value;
    if (!u||!p) { showMsg('login-msg','⚠ ENTER CALLSIGN AND ACCESS CODE.','error'); return; }

    // Admin shortcut
    if (u.toLowerCase() === 'admin' && p === 'admin@lrp') {
      showMsg('login-msg','✅ ADMIN ACCESS GRANTED','success');
      setTimeout(() => { window.location.href = 'admin.html'; }, 1000);
      return;
    }

    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    showMsg('login-msg', '⏳ VERIFYING...', 'loading');

    try {
      const params = new URLSearchParams({ action:'login', username:u, password:p });
      const res = await fetch(API_URL + '?' + params.toString());
      const data = await res.json();
      if (data.success) {
        showMsg('login-msg','✅ IDENTITY VERIFIED','success');
        setTimeout(() => {
          sessionStorage.setItem('lrp_user', JSON.stringify({ username: data.user.username, team: data.user.team }));
          if (data.isDefault) {
            showChangePassword(data.user.username, data.user.team);
          } else {
            showDashboard(data.user.username, data.user.team);
          }
        }, 1200);
      } else {
        showMsg('login-msg','⚠ INVALID CREDENTIALS — ACCESS DENIED.','error');
      }
    } catch(err) {
      showMsg('login-msg','⚠ CONNECTION ERROR. CHECK NETWORK.','error');
    }
    btn.disabled = false;
  }

  function showChangePassword(username, team) {
    document.querySelector('.panel-wrap').innerHTML = `
      <div class="panel">
        <div class="brand-bar">
          <div class="brand-icon">🔐</div>
          <div class="brand-text"><h1>SET NEW PASSWORD</h1></div>
        </div>
        <div class="divider"></div>
        <div style="background:rgba(255,160,0,.1);border:1px solid rgba(255,160,0,.3);border-radius:4px;padding:10px 14px;margin-bottom:18px;">
          <div style="font-size:11px;color:#ffa040;font-weight:700;letter-spacing:1px;">⚠ DEFAULT PASSWORD DETECTED</div>
          <div style="font-size:11px;color:rgba(168,216,234,.7);margin-top:4px;">You must set a new personal password before continuing.</div>
        </div>
        <div class="form-group">
          <label>New Password</label>
          <div class="input-wrap"><span class="input-icon">🔐</span><input type="password" id="new-pass" placeholder="Min 6 characters"/></div>
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <div class="input-wrap"><span class="input-icon">✅</span><input type="password" id="new-confirm" placeholder="Re-enter new password"/></div>
        </div>
        <div id="cpw-msg" class="msg"></div>
        <button class="btn-primary" id="cpw-btn" onclick="submitNewPassword('${username}','${team}')">🔒 SET NEW PASSWORD</button>
      </div>`;
  }

  async function submitNewPassword(username, team) {
    const np = document.getElementById('new-pass').value;
    const nc = document.getElementById('new-confirm').value;
    if (!np || !nc) { showMsg('cpw-msg','⚠ BOTH FIELDS ARE REQUIRED.','error'); return; }
    if (np.length < 6) { showMsg('cpw-msg','⚠ PASSWORD MUST BE ≥ 6 CHARACTERS.','error'); return; }
    if (np !== nc) { showMsg('cpw-msg','⚠ PASSWORDS DO NOT MATCH.','error'); return; }
    if (np === 'LRP@1234') { showMsg('cpw-msg','⚠ CANNOT USE DEFAULT PASSWORD. CHOOSE A NEW ONE.','error'); return; }

    const btn = document.getElementById('cpw-btn');
    btn.disabled = true;
    showMsg('cpw-msg','⏳ UPDATING PASSWORD...','loading');

    try {
      const params = new URLSearchParams({ action:'changePassword', username, newPassword:np });
      const res = await fetch(API_URL + '?' + params.toString());
      const data = await res.json();
      if (data.success) {
        showMsg('cpw-msg','✅ PASSWORD UPDATED SUCCESSFULLY!','success');
        setTimeout(() => showDashboard(username, team), 1200);
      } else {
        showMsg('cpw-msg','⚠ FAILED TO UPDATE. TRY AGAIN.','error');
        btn.disabled = false;
      }
    } catch(err) {
      showMsg('cpw-msg','⚠ CONNECTION ERROR.','error');
      btn.disabled = false;
    }
  }

  function showDashboard(username, team) {
    document.body.innerHTML = `
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');
      *{margin:0;padding:0;box-sizing:border-box;}
      body{font-family:'Rajdhani',sans-serif;background:#020f1e;min-height:100vh;overflow:hidden;}
      .db-bg{position:fixed;inset:0;background:linear-gradient(180deg,#020810 0%,#041428 40%,#0a3558 100%);}
      .db-stars{position:fixed;inset:0;background-image:radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,.8) 0%,transparent 100%),radial-gradient(1px 1px at 30% 8%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 55% 20%,rgba(255,255,255,.7) 0%,transparent 100%),radial-gradient(1px 1px at 75% 10%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 90% 25%,rgba(255,255,255,.6) 0%,transparent 100%);}
      .db-ocean{position:fixed;bottom:0;left:0;right:0;height:22%;overflow:hidden;}
      .db-wave{position:absolute;bottom:0;left:-50%;width:200%;height:100%;}
      .db-wave svg{width:100%;height:100%;}
      .wv1{animation:wv 8s linear infinite;opacity:.9;}
      .wv2{animation:wv 12s linear infinite reverse;opacity:.5;bottom:8px;}
      @keyframes wv{0%{transform:translateX(0)}100%{transform:translateX(25%)}}
      .db-topbar{position:relative;z-index:10;display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:14px 28px;background:rgba(4,28,53,.9);border-bottom:1px solid rgba(0,180,255,.2);backdrop-filter:blur(12px);gap:16px;}
      .db-brand{display:flex;align-items:center;gap:12px;}
      .db-brand-icon{width:40px;height:40px;background:linear-gradient(135deg,#c0441a,#e8610a);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
      .db-brand h1{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:#e0f4ff;letter-spacing:3px;white-space:nowrap;}
      .db-user-info{display:flex;flex-direction:column;align-items:center;justify-content:center;}
      .db-user-info .name{font-family:'Orbitron',sans-serif;font-size:11px;color:#a8e8ff;letter-spacing:2px;}
      .db-user-info .team-lbl{font-size:11px;color:rgba(0,200,255,.6);letter-spacing:1px;}
      .db-signout-wrap{display:flex;justify-content:flex-end;align-items:center;}
      .db-logout{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;padding:8px 18px;background:rgba(180,40,20,.25);border:1px solid rgba(255,80,60,.4);border-radius:3px;color:#ff9977;cursor:pointer;transition:all .3s;text-transform:uppercase;white-space:nowrap;}
      .db-logout:hover{background:rgba(180,40,20,.55);color:#fff;border-color:rgba(255,80,60,.8);}
      .db-body{position:relative;z-index:5;display:flex;align-items:center;justify-content:center;height:calc(100vh - 73px);gap:40px;padding:20px;}
      .db-card{width:320px;background:rgba(4,28,53,.88);border:1px solid rgba(0,180,255,.25);border-radius:4px;padding:36px 32px;cursor:pointer;transition:all .35s;backdrop-filter:blur(18px);box-shadow:0 20px 60px rgba(0,0,0,.6);position:relative;overflow:hidden;}
      .db-card::before,.db-card::after{content:'';position:absolute;width:14px;height:14px;border-color:rgba(0,180,255,.5);border-style:solid;}
      .db-card::before{top:-1px;left:-1px;border-width:2px 0 0 2px;}
      .db-card::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}
      .db-card:hover{transform:translateY(-8px);border-color:rgba(0,200,255,.6);box-shadow:0 30px 80px rgba(0,0,0,.7),0 0 40px rgba(0,180,255,.15);}
      .db-card-icon{font-size:48px;margin-bottom:18px;display:block;}
      .db-card-title{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;color:#e0f4ff;letter-spacing:3px;margin-bottom:10px;line-height:1.4;}
      .db-card-desc{font-family:'Rajdhani',sans-serif;font-size:13px;color:rgba(168,216,234,.7);line-height:1.6;margin-bottom:20px;}
      .db-card-btn{display:block;width:100%;padding:11px;text-align:center;background:linear-gradient(135deg,#0a4a7a,#0d6fa8);border:1px solid rgba(0,200,255,.4);border-radius:3px;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:#a8f0ff;transition:all .3s;}
      .db-card:hover .db-card-btn{background:linear-gradient(135deg,#0d6fa8,#14a0d0);color:#fff;box-shadow:0 0 20px rgba(0,180,255,.3);}
      .db-divider{width:1px;height:220px;background:linear-gradient(180deg,transparent,rgba(0,180,255,.4),transparent);}
      .db-card-badge{position:absolute;top:14px;right:14px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;padding:3px 8px;border-radius:2px;}
      .badge-ops{background:rgba(0,180,80,.15);border:1px solid rgba(0,180,80,.4);color:#00ff88;}
      .badge-log{background:rgba(180,100,0,.15);border:1px solid rgba(180,100,0,.4);color:#ffa040;}
    </style>
    <div class="db-bg"></div>
    <div class="db-stars"></div>
    <div class="db-ocean">
      <div class="db-wave wv1"><svg viewBox="0 0 1200 200" preserveAspectRatio="none"><path d="M0,100 C150,40 300,160 450,100 C600,40 750,160 900,100 C1050,40 1150,120 1200,100 L1200,200 L0,200 Z" fill="#0a3558" opacity=".9"/></svg></div>
      <div class="db-wave wv2"><svg viewBox="0 0 1200 200" preserveAspectRatio="none"><path d="M0,130 C200,70 400,170 600,130 C800,90 1000,170 1200,130 L1200,200 L0,200 Z" fill="#041828" opacity=".7"/></svg></div>
    </div>
    <div class="db-topbar">
      <div class="db-brand"><div class="db-brand-icon">🚢</div><h1>LRP SUPPORT PORTAL</h1></div>
      <div class="db-user-info"><div class="name">${username.toUpperCase()}</div><div class="team-lbl">⚓ ${team}</div></div>
      <div class="db-signout-wrap"><button class="db-logout" onclick="location.reload()">⎋ SIGN OUT</button></div>
    </div>
    <div class="db-body">
      <div class="db-card" onclick="openTool('handover')">
        <span class="db-card-badge badge-ops">OPERATIONS</span>
        <span class="db-card-icon">📋</span>
        <div class="db-card-title">SHIFT HANDOVER LOGGER</div>
        <div class="db-card-desc">Manage shift transitions, track ticket statuses across shifts, and generate handover reports for your team.</div>
        <div class="db-card-btn">OPEN MODULE →</div>
      </div>
      <div class="db-divider"></div>
      <div class="db-card" onclick="openTool('playbook')">
        <span class="db-card-badge badge-log">TRACKING</span>
        <span class="db-card-icon">⏱️</span>
        <div class="db-card-title">SUPPORT TICKET TIME LOGGER</div>
        <div class="db-card-desc">Track ticket resolution times, follow the support playbook checklist, and log your end-of-shift performance summary.</div>
        <div class="db-card-btn">OPEN MODULE →</div>
      </div>
    </div>`;

    window.openTool = function(tool) {
      const files = { handover: 'Shift_Handover_V5.html', playbook: 'Support Ticket Logger_V7.html' };
      const overlay = document.createElement('div');
      overlay.id = 'tool-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;background:#020f1e;';
      const toolLabel = tool === 'handover' ? '📋 Shift Handover Logger' : '⏱️ Support Ticket Time Logger';
      const bar = document.createElement('div');
      bar.style.cssText = `display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:16px;padding:10px 24px;background:rgba(4,28,53,.95);border-bottom:1px solid rgba(0,180,255,.2);flex-shrink:0;`;
      bar.innerHTML = `
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:34px;height:34px;background:linear-gradient(135deg,#c0441a,#e8610a);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:16px;">🚢</div>
          <div>
            <div style="font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;color:#e0f4ff;letter-spacing:2px;">LRP SUPPORT PORTAL</div>
            <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(0,200,255,.6);letter-spacing:1px;">${toolLabel}</div>
          </div>
        </div>
        <div></div>
        <div style="display:flex;align-items:center;gap:10px;justify-content:flex-end;">
          <button id="back-to-home" style="font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;padding:7px 16px;background:rgba(0,100,180,.25);border:1px solid rgba(0,180,255,.4);border-radius:3px;color:#a8e8ff;cursor:pointer;text-transform:uppercase;">← BACK TO HOME</button>
          <button id="tool-signout" style="font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;padding:7px 16px;background:rgba(180,40,20,.25);border:1px solid rgba(255,80,60,.4);border-radius:3px;color:#ff9977;cursor:pointer;text-transform:uppercase;">⎋ SIGN OUT</button>
        </div>`;
      const iframe = document.createElement('iframe');
      iframe.src = files[tool];
      iframe.style.cssText = 'flex:1;border:none;width:100%;height:100%;';
      overlay.appendChild(bar);
      overlay.appendChild(iframe);
      document.body.appendChild(overlay);
      document.getElementById('back-to-home').addEventListener('click', () => overlay.remove());
      document.getElementById('tool-signout').addEventListener('click', () => { overlay.remove(); location.reload(); });
    };
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const loginActive = document.getElementById('view-login') && document.getElementById('view-login').classList.contains('active');
      if (loginActive) handleLogin(); else handleRegister();
    }
  });
</script>
</body>
</html>
